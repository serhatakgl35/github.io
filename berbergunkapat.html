<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berber Haftalık Takvim</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;
background:#f5f5f7;
color:#111;
padding:20px;
}

.wrap{
max-width:1180px;
margin:0 auto;
}

.topbar{
background:#111;
color:white;
border-radius:22px;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 12px 30px rgba(0,0,0,.14);
margin-bottom:18px;
}

.brand{
font-weight:900;
font-size:18px;
}

.btn{
border:none;
border-radius:14px;
background:#111;
color:white;
padding:11px 14px;
font-weight:900;
cursor:pointer;
}

.btn.light{
background:white;
color:#111;
}

.panel{
background:white;
border-radius:24px;
padding:18px;
box-shadow:0 12px 32px rgba(0,0,0,.08);
}

.controls{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:12px;
}

.hafta{
border:1px solid #ddd;
background:#fafafa;
border-radius:14px;
padding:13px;
text-align:center;
font-weight:900;
margin-bottom:14px;
}

.table-wrap{
overflow-x:auto;
border-radius:16px;
border:1px solid #ddd;
background:white;
}

table{
width:100%;
min-width:980px;
border-collapse:collapse;
table-layout:fixed;
}

th,td{
border:1px solid #ddd;
text-align:center;
vertical-align:middle;
padding:8px 5px;
}

th{
background:#ececec;
font-size:12px;
}

.saat{
width:80px;
background:#f3f3f3;
font-weight:900;
font-size:16px;
cursor:pointer;
}

.gun{
cursor:pointer;
}

.gun:hover,
.saat:hover,
.slot-click:hover{
filter:brightness(.96);
box-shadow:inset 0 0 0 2px rgba(0,0,0,.12);
}

.gun-adi{
font-weight:900;
}

.gun-tarih{
font-size:11px;
color:#333;
margin-top:2px;
}

.musait{
background:#dff3df;
color:#006000;
font-weight:900;
}

.dolu{
background:#ffd4d4;
color:#850000;
}

.kapali{
background:#d7d7d7!important;
color:#555!important;
font-weight:900;
}

.gecmis{
background:#e5e5e5;
color:#666;
font-weight:900;
}

.isim{
font-weight:900;
font-size:12px;
margin-bottom:3px;
}

.mini{
font-size:10px;
line-height:1.25;
}

.etiket{
display:inline-block;
margin-top:5px;
padding:3px 8px;
border-radius:999px;
font-size:9px;
font-weight:900;
}

.e-acik{background:#c9eec9;color:#146214}
.e-bos{background:#c9eec9;color:#146214}
.e-dolu{background:#ffbcbc;color:#8b0000}
.e-kapali{background:#cfcfcf;color:#555}

.status{
margin-top:12px;
background:white;
border-radius:14px;
padding:12px;
color:#555;
box-shadow:0 7px 20px rgba(0,0,0,.06);
}

.toast{
position:fixed;
left:50%;
bottom:24px;
transform:translateX(-50%);
background:#111;
color:white;
padding:13px 18px;
border-radius:999px;
font-weight:900;
box-shadow:0 12px 30px rgba(0,0,0,.22);
z-index:9999;
opacity:0;
pointer-events:none;
transition:.25s ease;
max-width:90%;
text-align:center;
}

.toast.show{
opacity:1;
bottom:34px;
}

@media(max-width:700px){
body{padding:10px}
.topbar{flex-direction:column;align-items:flex-start;gap:10px}
.controls .btn{width:100%}
}
</style>
</head>

<body>

<div class="wrap">

  <div class="topbar">
    <div class="brand">✂️ Berber Haftalık Takvim</div>
    <button class="btn light" onclick="cikis()">Çıkış Yap</button>
  </div>

  <div class="panel">
    <div class="controls">
      <button class="btn" onclick="oncekiHafta()">← Önceki</button>
      <button class="btn" onclick="buHafta()">Bu Hafta</button>
      <button class="btn" onclick="takvimYukle()">Yenile</button>
      <button class="btn" onclick="sonrakiHafta()">Sonraki →</button>
    </div>

    <div id="haftaYazi" class="hafta">Yükleniyor...</div>

    <div class="table-wrap">
      <div id="takvimAlan">Yükleniyor...</div>
    </div>

    <div id="durum" class="status">
      Gün başlığına basınca gün aç/kapanır. Saat başlığına basınca o saat haftalık aç/kapanır. Boş slotlara basınca tek saat aç/kapanır.
    </div>

    <div style="margin-top:16px; text-align:center;">
      <button class="btn light" onclick="location.href='https://www.kantin10.com.tr/berberpanel.html'">
        ← Berber Paneline Dön
      </button>
    </div>
  </div>

</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain:"berber-randevu-14f7f.firebaseapp.com",
  projectId:"berber-randevu-14f7f",
  storageBucket:"berber-randevu-14f7f.firebasestorage.app",
  messagingSenderId:"280530860977",
  appId:"1:280530860977:web:52c0df04c228896f211b90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

if(
  localStorage.getItem("berberGiris") !== "true" &&
  localStorage.getItem("adminGiris") !== "true" &&
  localStorage.getItem("adminLogin") !== "true"
){
  location.href = "berbergiris.html";
}

const takvimAlan = document.getElementById("takvimAlan");
const haftaYazi = document.getElementById("haftaYazi");
const durum = document.getElementById("durum");
const toast = document.getElementById("toast");

const SAATLER = ["09:00","09:50","10:30","11:20","13:20","14:00","14:50","15:30"];
const GUNLER = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];

let aktifHafta = pazartesiBul(new Date());
let randevular = [];
let kapaliGunler = {};
let kapaliSaatler = {};

function bildirim(metin){
  toast.innerText = metin;
  toast.classList.add("show");
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(()=>toast.classList.remove("show"),3000);
}

function iki(n){return String(n).padStart(2,"0")}

function tarihKey(d){
  return d.getFullYear()+"-"+iki(d.getMonth()+1)+"-"+iki(d.getDate());
}

function tarihGoster(d){
  return iki(d.getDate())+"/"+iki(d.getMonth()+1)+"/"+d.getFullYear();
}

function tarihFormatla(t){
  if(!t) return "-";
  const p = String(t).split("-");
  if(p.length !== 3) return t;
  return `${p[2]}/${p[1]}/${p[0]}`;
}

function pazartesiBul(t){
  const d = new Date(t);
  d.setHours(0,0,0,0);
  const gun = d.getDay();
  const fark = gun === 0 ? -6 : 1 - gun;
  d.setDate(d.getDate()+fark);
  return d;
}

function haftaGunleri(baslangic){
  const arr = [];
  for(let i=0;i<5;i++){
    const d = new Date(baslangic);
    d.setDate(baslangic.getDate()+i);
    arr.push(d);
  }
  return arr;
}

function esc(x){
  return String(x || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function normalize(d,id){
  return {
    id,
    tarih: d.date || d.tarih || d.kayitTarih || "",
    saat: d.time || d.saat || d.zaman || d.kayitSaat || "",
    ad: d.name || d.isim || d.adSoyad || d.kayitAd || "",
    telefon: d.phone || d.telefon || d.kayitTelefon || "",
    hizmet: d.service || d.hizmet || d.kayitHizmet || ""
  };
}

function gecmisMi(tarih,saat){
  if(!tarih || !saat) return false;
  const dt = new Date(`${tarih}T${saat}:00`);
  const limit = new Date(dt);
  limit.setMinutes(limit.getMinutes()+1);
  return new Date() >= limit;
}

async function verileriAl(){
  randevular = [];
  kapaliGunler = {};
  kapaliSaatler = {};

  const rSnap = await getDocs(collection(db,"randevular"));
  rSnap.forEach(x=>{
    const r = normalize(x.data(),x.id);
    if(r.tarih && r.saat && r.ad && r.telefon){
      randevular.push(r);
    }
  });

  const gSnap = await getDocs(collection(db,"kapali_gunler"));
  gSnap.forEach(x=>{
    kapaliGunler[x.id] = true;
  });

  const sSnap = await getDocs(collection(db,"kapali_saatler"));
  sSnap.forEach(x=>{
    const d = x.data();
    if(d.tarih && d.saat){
      kapaliSaatler[d.tarih+"_"+d.saat] = x.id;
    }
  });
}

function takvimCiz(){
  const gunler = haftaGunleri(aktifHafta);
  haftaYazi.innerText = tarihGoster(gunler[0]) + " - " + tarihGoster(gunler[4]);

  const rMap = {};
  randevular.forEach(r=>{
    rMap[r.tarih+"_"+r.saat] = r;
  });

  let html = "<table>";
  html += "<thead><tr>";
  html += `<th class="saat">Saat<br><span class="etiket e-kapali">TIKLA</span></th>`;

  gunler.forEach((g,i)=>{
    const t = tarihKey(g);
    const kapali = !!kapaliGunler[t];

    html += `
      <th class="gun ${kapali ? "kapali" : ""}" onclick="gunToggle('${t}')">
        <div class="gun-adi">${GUNLER[i]}</div>
        <div class="gun-tarih">${tarihGoster(g)}</div>
        <span class="etiket ${kapali ? "e-kapali" : "e-acik"}">
          ${kapali ? "KAPALI GÜN" : "AÇIK"}
        </span>
      </th>
    `;
  });

  html += "</tr></thead><tbody>";

  SAATLER.forEach(saat=>{
    html += "<tr>";

    const gunlerSaatKapali = gunler.every(g=>{
      const t = tarihKey(g);
      return kapaliGunler[t] || kapaliSaatler[t+"_"+saat];
    });

    html += `
      <td class="saat ${gunlerSaatKapali ? "kapali" : ""}" onclick="saatToggle('${saat}')">
        ${saat}<br>
        <span class="etiket ${gunlerSaatKapali ? "e-kapali" : "e-acik"}">
          ${gunlerSaatKapali ? "KAPALI" : "AÇIK"}
        </span>
      </td>
    `;

    gunler.forEach(g=>{
      const t = tarihKey(g);
      const key = t+"_"+saat;
      const r = rMap[key];

      if(kapaliGunler[t]){
        html += `
          <td class="kapali">
            KAPALI<br>
            <span class="etiket e-kapali">GÜN</span>
          </td>
        `;
      }
      else if(kapaliSaatler[key]){
        html += `
          <td class="kapali slot-click" onclick="tekSaatToggle('${t}','${saat}')">
            KAPALI<br>
            <span class="etiket e-kapali">SAAT</span>
          </td>
        `;
      }
      else if(r){
        html += `
          <td class="${gecmisMi(r.tarih,r.saat) ? "gecmis" : "dolu"}">
            <div class="isim">${esc(r.ad)}</div>
            <div class="mini">${esc(r.telefon)}</div>
            <div class="mini">${esc(r.hizmet || "-")}</div>
            <span class="etiket ${gecmisMi(r.tarih,r.saat) ? "e-kapali" : "e-dolu"}">
              ${gecmisMi(r.tarih,r.saat) ? "GEÇMİŞ" : "DOLU"}
            </span>
          </td>
        `;
      }
      else if(gecmisMi(t,saat)){
        html += `
          <td class="gecmis">
            GEÇMİŞ<br>
            <span class="etiket e-kapali">SÜRE GEÇTİ</span>
          </td>
        `;
      }
      else{
        html += `
          <td class="musait slot-click" onclick="tekSaatToggle('${t}','${saat}')">
            MÜSAİT<br>
            <span class="etiket e-bos">BOŞ</span>
          </td>
        `;
      }
    });

    html += "</tr>";
  });

  html += "</tbody></table>";
  takvimAlan.innerHTML = html;
}

window.takvimYukle = async function(){
  try{
    durum.innerText = "Takvim yükleniyor...";
    takvimAlan.innerHTML = "Yükleniyor...";
    await verileriAl();
    takvimCiz();
    durum.innerText = "Takvim hazır. Berber de gün/saat açıp kapatabilir.";
  }catch(e){
    console.error(e);
    durum.innerText = "Takvim yüklenemedi. Firestore Rules kontrol edilmeli.";
    takvimAlan.innerHTML = "Hata oluştu.";
  }
}

window.gunToggle = async function(tarih){
  try{
    const kapaliMi = !!kapaliGunler[tarih];
    const islem = kapaliMi ? "açılsın mı" : "kapatılsın mı";

    if(!confirm(`${tarihFormatla(tarih)} günü ${islem}?`)) return;

    if(kapaliMi){
      await deleteDoc(doc(db,"kapali_gunler",tarih));
      durum.innerText = tarihFormatla(tarih) + " günü açıldı.";
      bildirim("✅ " + tarihFormatla(tarih) + " günü açıldı.");
    }else{
      await setDoc(doc(db,"kapali_gunler",tarih),{
        tarih,
        kapali:true,
        tip:"gun",
        createdAt:new Date().toISOString()
      });
      durum.innerText = tarihFormatla(tarih) + " günü kapatıldı.";
      bildirim("⛔ " + tarihFormatla(tarih) + " günü kapatıldı.");
    }

    await takvimYukle();
  }catch(e){
    console.error(e);
    alert("Gün aç/kapat işlemi başarısız.");
  }
}

window.tekSaatToggle = async function(tarih,saat){
  try{
    const key = tarih+"_"+saat;
    const id = tarih+"_"+saat.replace(":","-");
    const kapaliMi = !!kapaliSaatler[key];
    const islem = kapaliMi ? "açılsın mı" : "kapatılsın mı";

    if(!confirm(`${tarihFormatla(tarih)} günü ${saat} saati ${islem}?`)) return;

    if(kapaliMi){
      await deleteDoc(doc(db,"kapali_saatler",kapaliSaatler[key]));
      durum.innerText = tarihFormatla(tarih) + " " + saat + " açıldı.";
      bildirim("✅ " + tarihFormatla(tarih) + " " + saat + " açıldı.");
    }else{
      await setDoc(doc(db,"kapali_saatler",id),{
        tarih,
        saat,
        kapali:true,
        tip:"saat",
        createdAt:new Date().toISOString()
      });
      durum.innerText = tarihFormatla(tarih) + " " + saat + " kapatıldı.";
      bildirim("⛔ " + tarihFormatla(tarih) + " " + saat + " kapatıldı.");
    }

    await takvimYukle();
  }catch(e){
    console.error(e);
    alert("Saat aç/kapat işlemi başarısız.");
  }
}

window.saatToggle = async function(saat){
  try{
    const gunler = haftaGunleri(aktifHafta);

    const hepsiKapali = gunler.every(g=>{
      const t = tarihKey(g);
      return kapaliGunler[t] || kapaliSaatler[t+"_"+saat];
    });

    const islem = hepsiKapali ? "bu hafta açılsın mı" : "bu hafta kapatılsın mı";
    if(!confirm(`${saat} saati ${islem}?`)) return;

    if(hepsiKapali){
      for(const g of gunler){
        const t = tarihKey(g);
        const key = t+"_"+saat;

        if(kapaliSaatler[key]){
          await deleteDoc(doc(db,"kapali_saatler",kapaliSaatler[key]));
        }
      }
      durum.innerText = saat + " bu hafta açıldı.";
      bildirim("✅ " + saat + " saati bu hafta açıldı.");
    }else{
      for(const g of gunler){
        const t = tarihKey(g);

        if(kapaliGunler[t]) continue;

        const id = t+"_"+saat.replace(":","-");

        await setDoc(doc(db,"kapali_saatler",id),{
          tarih:t,
          saat,
          kapali:true,
          tip:"haftalik_saat",
          createdAt:new Date().toISOString()
        });
      }
      durum.innerText = saat + " bu hafta kapatıldı.";
      bildirim("⛔ " + saat + " saati bu hafta kapatıldı.");
    }

    await takvimYukle();
  }catch(e){
    console.error(e);
    alert("Haftalık saat aç/kapat işlemi başarısız.");
  }
}

window.oncekiHafta = function(){
  aktifHafta.setDate(aktifHafta.getDate()-7);
  takvimYukle();
}

window.buHafta = function(){
  aktifHafta = pazartesiBul(new Date());
  takvimYukle();
}

window.sonrakiHafta = function(){
  aktifHafta.setDate(aktifHafta.getDate()+7);
  takvimYukle();
}

window.cikis = function(){
  localStorage.clear();
  location.href = "berbergiris.html";
}

takvimYukle();
</script>

</body>
</html>
