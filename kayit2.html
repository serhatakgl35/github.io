<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İlk Kayıt Ol</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;
background:
  radial-gradient(circle at 20% 10%, rgba(255,255,255,.95), transparent 32%),
  radial-gradient(circle at 80% 0%, rgba(225,229,238,.9), transparent 35%),
  #f5f5f7;
color:#111;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:18px;
}

.card{
width:100%;
max-width:430px;
background:rgba(255,255,255,.84);
padding:32px;
border-radius:34px;
box-shadow:0 28px 80px rgba(0,0,0,.13);
text-align:center;
border:1px solid rgba(255,255,255,.75);
backdrop-filter:blur(22px);
-webkit-backdrop-filter:blur(22px);
}

.logo{
width:66px;
height:66px;
border-radius:20px;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
margin:0 auto 18px;
box-shadow:0 14px 34px rgba(0,0,0,.18);
}

h1{
margin:10px 0 8px;
font-size:30px;
font-weight:950;
letter-spacing:-.8px;
}

p{
color:#666;
margin:0 0 24px;
font-size:16px;
}

label{
display:block;
text-align:left;
font-weight:900;
margin:14px 0 7px;
font-size:15px;
}

input{
width:100%;
padding:16px 18px;
border-radius:18px;
border:1px solid rgba(0,0,0,.12);
background:#eef1f6;
font-size:16px;
outline:none;
}

input:focus{
background:white;
border-color:rgba(0,0,0,.28);
}

button,.link-btn{
width:100%;
margin-top:18px;
padding:16px;
border:none;
border-radius:20px;
background:#111;
color:white;
font-weight:950;
font-size:17px;
cursor:pointer;
text-decoration:none;
display:block;
}

.alt{
margin-top:16px;
}

.alt .link-btn{
background:white;
color:#111;
border:1px solid rgba(0,0,0,.12);
}

.note{
margin-top:14px;
font-size:13px;
color:#666;
}

/* 🚀 MOBİL HIZLANDIRMA */
@media(max-width:520px){

body{
background:#f5f5f7;
}

.card{
backdrop-filter:none;
-webkit-backdrop-filter:none;
box-shadow:0 10px 28px rgba(0,0,0,.08);
}

.logo{
box-shadow:none;
}

button,.link-btn{
box-shadow:none;
}

}
</style>
</head>

<body>

<div class="card">

  <div class="logo">✂️</div>

  <h1>Kayıt Ol</h1>

  <label>Ad</label>
  <input type="text" id="ad">

  <label>Soyad</label>
  <input type="text" id="soyad" oninput="buyukYap(this)">

  <label>Telefon</label>
  <input type="tel" id="tel" oninput="telDuzenle(this)">

  <label>Şifre</label>
  <input type="password" id="sifre">

  <button onclick="kayitOl()">Kayıt Ol</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain:"berber-randevu-14f7f.firebaseapp.com",
  projectId:"berber-randevu-14f7f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.buyukYap = function(input){
  input.value = input.value.toUpperCase();
}

window.telDuzenle = function(input){
  let v = input.value.replace(/\D/g,"");
  if(!v) return input.value="";
  if(!v.startsWith("0")) v = "0" + v;
  input.value = v.slice(0,11);
}

window.kayitOl = async function(){

  const ad = document.getElementById("ad").value.trim();
  const soyad = document.getElementById("soyad").value.trim();
  const tel = document.getElementById("tel").value.trim();
  const sifre = document.getElementById("sifre").value.trim();

  if(!ad || !soyad) return alert("Ad soyad gir");
  if(tel.length !== 11) return alert("Telefon hatalı");
  if(sifre.length < 4) return alert("Şifre kısa");

  const isim = ad + " " + soyad;

  const ref = doc(db,"personeller",tel);
  const snap = await getDoc(ref);

  if(snap.exists()){
    alert("Bu numara kayıtlı");
    return;
  }

  await setDoc(ref,{
    ad,
    soyad,
    isim,
    telefon:tel,
    sifre,
    aktif:true,
    createdAt:new Date().toISOString()
  });

  alert("Kayıt başarılı");
  location.href="randevu.html";
}
</script>

</body>
</html>
