<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berber Haftalık Takvim</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;
background:#f5f5f7;
color:#111;
padding:20px;
}

.wrap{
max-width:1180px;
margin:0 auto;
}

.topbar{
background:#111;
color:white;
border-radius:22px;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 12px 30px rgba(0,0,0,.14);
margin-bottom:18px;
}

.brand{
font-weight:900;
font-size:18px;
}

.btn{
border:none;
border-radius:14px;
background:#111;
color:white;
padding:11px 14px;
font-weight:900;
cursor:pointer;
}

.btn.light{
background:white;
color:#111;
}

.panel{
background:white;
border-radius:24px;
padding:18px;
box-shadow:0 12px 32px rgba(0,0,0,.08);
}

.controls{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:12px;
}

.hafta{
border:1px solid #ddd;
background:#fafafa;
border-radius:14px;
padding:13px;
text-align:center;
font-weight:900;
margin-bottom:14px;
}

.table-wrap{
overflow-x:auto;
border-radius:16px;
border:1px solid #ddd;
background:white;
}

table{
width:100%;
min-width:980px;
border-collapse:collapse;
table-layout:fixed;
}

th,td{
border:1px solid #ddd;
text-align:center;
vertical-align:middle;
padding:8px 5px;
}

th{
background:#ececec;
font-size:12px;
}

.saat{
width:80px;
background:#f3f3f3;
font-weight:900;
font-size:16px;
cursor:pointer;
}

.gun{
cursor:pointer;
}

.gun:hover,
.saat:hover,
.slot-click:hover{
filter:brightness(.96);
box-shadow:inset 0 0 0 2px rgba(0,0,0,.12);
}

.gun-adi{
font-weight:900;
}

.gun-tarih{
font-size:11px;
color:#333;
margin-top:2px;
}

.musait{
background:#dff3df;
color:#006000;
font-weight:900;
}

.dolu{
background:#ffd4d4;
color:#850000;
}

.kapali{
background:#d7d7d7!important;
color:#555!important;
font-weight:900;
}

.gecmis{
background:#e5e5e5;
color:#666;
font-weight:900;
}

.isim{
font-weight:900;
font-size:12px;
margin-bottom:3px;
}

.mini{
font-size:10px;
line-height:1.25;
}

.etiket{
display:inline-block;
margin-top:5px;
padding:3px 8px;
border-radius:999px;
font-size:9px;
font-weight:900;
}

.e-acik{background:#c9eec9;color:#146214;}
.e-bos{background:#c9eec9;color:#146214;}
.e-dolu{background:#ffbcbc;color:#8b0000;}
.e-kapali{background:#cfcfcf;color:#555;}

.status{
margin-top:12px;
background:white;
border-radius:14px;
padding:12px;
color:#555;
box-shadow:0 7px 20px rgba(0,0,0,.06);
}

@media(max-width:700px){
body{padding:10px}
.topbar{flex-direction:column;align-items:flex-start;gap:10px}
.controls .btn{width:100%}
}
</style>
</head>

<body>

<div class="wrap">

  <div class="topbar">
    <div class="brand">✂️ Berber Haftalık Takvim</div>
    <button class="btn light" onclick="cikis()">Çıkış Yap</button>
  </div>

  <div class="panel">

    <div class="controls">
      <button class="btn" onclick="oncekiHafta()">← Önceki</button>
      <button class="btn" onclick="buHafta()">Bu Hafta</button>
      <button class="btn" onclick="takvimYukle()">Yenile</button>
      <button class="btn" onclick="sonrakiHafta()">Sonraki →</button>
    </div>

    <div id="haftaYazi" class="hafta">Yükleniyor...</div>

    <div class="table-wrap">
      <div id="takvimAlan">Yükleniyor...</div>
    </div>

    <div id="durum" class="status">
      Gün başlığına basınca gün aç/kapanır. Saat başlığına basınca o saat haftalık aç/kapanır. Boş slotlara basınca tek saat aç/kapanır.
    </div>

    <!-- 🔥 SADECE EKLENEN KISIM -->
    <div style="margin-top:16px; text-align:center;">
      <button class="btn light" onclick="location.href='https://www.kantin10.com.tr/berberpanel.html'">
        Ana Sayfa
      </button>
    </div>

  </div>

</div>

<script type="module">
// (BURASI SENİN ORİJİNAL JS KODUN — HİÇ DOKUNULMADI)
// Firebase ve tüm fonksiyonlar aynen kalacak
</script>

</body>
</html>
