<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personel Paneli</title>
<style>
*{box-sizing:border-box}
:root{
  --bg:#f5f5f7;
  --text:#111;
  --muted:#666;
  --card:#fff;
  --dark:#111;
  --shadow:0 18px 55px rgba(0,0,0,.10);
  --soft:0 8px 25px rgba(0,0,0,.08);
  --r:26px;
}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,.95), transparent 32%),
    radial-gradient(circle at 80% 0%, rgba(225,229,238,.9), transparent 35%),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
}
.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(17,17,17,.94);
  color:white;
  padding:14px 18px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  box-shadow:0 4px 18px rgba(0,0,0,.18);
  backdrop-filter:blur(16px);
}
.topbar a,.topbar button{
  background:white;
  color:#111;
  text-decoration:none;
  border:0;
  border-radius:999px;
  padding:9px 15px;
  font-weight:900;
  cursor:pointer;
}
.wrap{
  width:min(1180px,100%);
  margin:28px auto;
  padding:0 16px;
}
.card{
  background:rgba(255,255,255,.88);
  border-radius:var(--r);
  padding:24px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
  margin-bottom:18px;
}
h1{
  font-size:30px;
  margin:0 0 10px;
  font-weight:950;
  letter-spacing:-.5px;
}
p{
  color:var(--muted);
  line-height:1.45;
}
.hide{
  display:none!important;
}
@media(max-width:720px){
  h1{font-size:25px}
  .wrap{padding:0 10px}
  .card{padding:18px;border-radius:22px}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html">Giriş</a>
  <button onclick="logout()">Çıkış</button>
</div>

<div class="wrap">
  <div class="card">
    <h1>Personel Paneli</h1>
    <p id="welcome">Hoş geldin.</p>
  </div>
</div>

<script>
const tel = localStorage.getItem("musteriTelefon");
const ad = localStorage.getItem("musteriAd") || "Personel";

if(!tel){
  location.href="index.html";
}

document.getElementById("welcome").textContent = ad + " olarak giriş yapıldı.";

function logout(){
  localStorage.removeItem("musteriGiris");
  localStorage.removeItem("musteriTelefon");
  localStorage.removeItem("musteriAd");
  localStorage.removeItem("personelDocId");
  location.href="index.html";
}
</script>

</body>
</html>
