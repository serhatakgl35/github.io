<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personel Paneli</title>

<style>
*{
  box-sizing:border-box;
}

:root{
  --bg:#f5f5f7;
  --card:#ffffffcc;
  --text:#111;
  --muted:#6b7280;
  --line:#e5e7eb;
  --shadow:0 18px 60px rgba(0,0,0,.10);
  --shadow2:0 10px 35px rgba(0,0,0,.08);
  --r:30px;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.95), transparent 28%),
    radial-gradient(circle at top right, rgba(220,224,235,.9), transparent 30%),
    #f5f5f7;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
  color:var(--text);
}

.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(17,17,17,.92);
  backdrop-filter:blur(18px);
  padding:14px 18px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  box-shadow:0 8px 30px rgba(0,0,0,.18);
}

.topbar a,
.topbar button{
  border:0;
  background:white;
  color:#111;
  border-radius:999px;
  padding:10px 16px;
  font-weight:900;
  text-decoration:none;
  cursor:pointer;
  transition:.18s;
}

.topbar button:hover,
.topbar a:hover{
  transform:translateY(-1px);
}

.wrap{
  width:min(1200px,100%);
  margin:28px auto;
  padding:0 16px 40px;
}

.hero{
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(18px);
  border-radius:36px;
  padding:34px;
  box-shadow:var(--shadow);
  margin-bottom:24px;
}

.hero h1{
  margin:0;
  font-size:48px;
  font-weight:1000;
  letter-spacing:-1.8px;
}

.hero p{
  margin:14px 0 0;
  color:var(--muted);
  font-size:20px;
  line-height:1.5;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
  gap:22px;
}

.card{
  position:relative;
  overflow:hidden;
  background:rgba(255,255,255,.86);
  border-radius:34px;
  padding:30px;
  box-shadow:var(--shadow2);
  text-decoration:none;
  color:#111;
  transition:.22s ease;
  min-height:230px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 28px 70px rgba(0,0,0,.14);
}

.card::before{
  content:"";
  position:absolute;
  inset:-80px auto auto -80px;
  width:180px;
  height:180px;
  border-radius:50%;
  background:rgba(255,255,255,.55);
}

.card::after{
  content:"";
  position:absolute;
  right:-40px;
  bottom:-40px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(255,255,255,.28);
}

.cardTop{
  position:absolute;
  top:24px;
  left:24px;
  right:24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.badge{
  background:#111;
  color:white;
  border-radius:999px;
  padding:8px 13px;
  font-size:12px;
  font-weight:900;
}

.arrow{
  width:46px;
  height:46px;
  border-radius:16px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:900;
  box-shadow:0 10px 25px rgba(0,0,0,.10);
}

.card h2{
  margin:0 0 10px;
  font-size:31px;
  letter-spacing:-1px;
}

.card p{
  margin:0;
  color:var(--muted);
  font-size:15px;
  line-height:1.55;
}

.card.dark{
  background:linear-gradient(135deg,#111,#1e293b);
  color:white;
}

.card.dark p{
  color:rgba(255,255,255,.75);
}

.card.dark .badge{
  background:white;
  color:#111;
}

.card.dark .arrow{
  background:rgba(255,255,255,.14);
  color:white;
}

.card.blue{
  background:linear-gradient(135deg,#eef4ff,#dfe9ff);
}

.card.green{
  background:linear-gradient(135deg,#ecfff3,#d8ffe7);
}

.card.orange{
  background:linear-gradient(135deg,#fff6eb,#ffe7cb);
}

.footer{
  margin-top:30px;
  text-align:center;
  color:#9ca3af;
  font-size:13px;
}

@media(max-width:780px){

  .hero{
    padding:26px;
    border-radius:28px;
  }

  .hero h1{
    font-size:38px;
  }

  .hero p{
    font-size:17px;
  }

  .card{
    min-height:200px;
    border-radius:28px;
    padding:24px;
  }

  .card h2{
    font-size:26px;
  }

}
</style>
</head>

<body>

<div class="topbar">
  <a href="index.html">Ana Sayfa</a>
  <button onclick="logout()">Çıkış</button>
</div>

<div class="wrap">

  <section class="hero">
    <h1>Personel Paneli</h1>
    <p id="welcome">
      Hoş geldin.
    </p>
  </section>

  <section class="grid">

    <a class="card dark" href="randevu.html">

      <div class="cardTop">
        <div class="badge">AKTİF</div>
        <div class="arrow">→</div>
      </div>

      <h2>Berber Randevusu</h2>

      <p>
        Berber randevularını oluştur, görüntüle ve yönet.
      </p>

    </a>

    <a class="card blue" href="kantin-veresiye.html">

      <div class="cardTop">
        <div class="badge">KANTİN</div>
        <div class="arrow">→</div>
      </div>

      <h2>Kantin Veresiye</h2>

      <p>
        Güncel veresiye borcunu ve ödeme geçmişini görüntüle.
      </p>

    </a>

    <a class="card green" href="odeme.html">

      <div class="cardTop">
        <div class="badge">YAKINDA</div>
        <div class="arrow">→</div>
      </div>

      <h2>Çay Ocağı</h2>

      <p>
        Aidat ve çay ocağı ödeme durumlarını görüntüle.
      </p>

    </a>

  </section>

  <div class="footer">
    Kantin10 Personel Sistemi
  </div>

</div>

<script>

const tel = localStorage.getItem("musteriTelefon");
const ad  = localStorage.getItem("musteriAd") || "Personel";

if(!tel){
  location.href = "index.html";
}

document.getElementById("welcome").textContent =
  ad + " olarak giriş yapıldı.";

function logout(){

  localStorage.removeItem("musteriGiris");
  localStorage.removeItem("musteriTelefon");
  localStorage.removeItem("musteriAd");
  localStorage.removeItem("personelDocId");

  location.href = "index.html";
}

</script>

</body>
</html>
