<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Haftalık Randevu Paneli</title>

<style>
/* SENİN TÜM CSS AYNI KALDI */
*{box-sizing:border-box;}
body{margin:0;padding:8px;background:#fff;font-family:Arial;}
</style>
</head>

<body>

<div id="app" style="display:none;">
<!-- BURASI SENİN SAYFA İÇERİĞİN -->
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs, query, where, doc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain: "berber-randevu-14f7f.firebaseapp.com",
  projectId: "berber-randevu-14f7f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔐 ADMIN KONTROL
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "admin.html";
    return;
  }

  const adminRef = doc(db, "admins", user.uid);
  const adminSnap = await getDoc(adminRef);

  if (!adminSnap.exists() || adminSnap.data().aktif !== true) {
    await signOut(auth);
    window.location.href = "admin.html";
    return;
  }

  // ✅ ADMIN GİRİŞ OK → SAYFAYI GÖSTER
  document.getElementById("app").style.display = "block";

  sistemBaslat();
});

// ------------------ SENİN KODLAR ------------------

const KOLEKSIYON = "randevular";

async function sistemBaslat() {
  console.log("Admin giriş başarılı, panel çalışıyor...");
}

</script>

</body>
