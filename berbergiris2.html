<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berber Giriş</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;
background:linear-gradient(135deg,#f5f5f7,#e8e8ed);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
color:#111;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.92);
backdrop-filter:blur(20px);
border-radius:26px;
padding:30px;
box-shadow:0 18px 45px rgba(0,0,0,0.12);
}

.logo{
width:62px;
height:62px;
border-radius:20px;
background:#111;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin:0 auto 18px;
}

h1{
text-align:center;
margin:0;
font-size:25px;
font-weight:800;
}

.subtitle{
text-align:center;
margin:10px 0 25px;
color:#666;
font-size:14px;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:700;
}

input{
width:100%;
padding:15px;
border-radius:16px;
border:1px solid #ddd;
font-size:16px;
background:#fafafa;
margin-bottom:15px;
}

button{
width:100%;
border:none;
border-radius:17px;
background:#111;
color:white;
padding:15px;
font-size:16px;
font-weight:800;
cursor:pointer;
}

.message{
margin-top:15px;
padding:12px;
border-radius:12px;
display:none;
font-size:14px;
}

.error{
background:#ffecec;
color:#b00020;
}

.success{
background:#eaffea;
color:#137333;
}
</style>
</head>

<body>

<div class="card">
<div class="logo">✂️</div>

<h1>Berber Giriş</h1>
<p class="subtitle">Randevularını görüntülemek için giriş yap</p>

<label>Telefon Numarası</label>
<input id="telefon" placeholder="">

<label>Şifre</label>
<input id="sifre" type="password" placeholder="Şifre">

<button onclick="giris()">Giriş Yap</button>

<div id="msg" class="message"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
authDomain: "berber-randevu-14f7f.firebaseapp.com",
projectId: "berber-randevu-14f7f",
storageBucket: "berber-randevu-14f7f.firebasestorage.app",
messagingSenderId: "280530860977",
appId: "1:280530860977:web:52c0df04c228896f211b90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const telInput = document.getElementById("telefon");
const msg = document.getElementById("msg");

/* 🔥 TELEFON FIX */
function formatTel(v){
let t = v.replace(/\D/g,'');

if(!t) return "";

if(t.startsWith("90")) t = t.substring(2);

if(t.startsWith("5")) t = "0" + t;

t = t.substring(0,11);

return t;
}

telInput.addEventListener("input",()=>{
const cursor = telInput.selectionStart;
telInput.value = formatTel(telInput.value);
telInput.setSelectionRange(cursor, cursor);
});

function mesaj(tip,text){
msg.innerText=text;
msg.className="message "+tip;
msg.style.display="block";
}

/* 🔥 GİRİŞ */
window.giris = async function(){

const telefon = telInput.value;
const sifre = document.getElementById("sifre").value;

if(telefon.length !== 11){
mesaj("error","Telefon eksik");
return;
}

try{

const q = query(collection(db,"berberler"), where("telefon","==",telefon));
const snap = await getDocs(q);

if(snap.empty){
mesaj("error","Kayıt bulunamadı");
return;
}

const doc = snap.docs[0];
const data = doc.data();

if(data.sifre != sifre){
mesaj("error","Şifre hatalı");
return;
}

if(data.aktif !== true){
mesaj("error","Hesap pasif");
return;
}

/* 🔥 KRİTİK FIX */
localStorage.setItem("berberGiris","true");
localStorage.setItem("berberTelefon",telefon);
localStorage.setItem("berberAdSoyad",data.adSoyad || "Berber");
localStorage.setItem("berberId",doc.id);

mesaj("success","Giriş başarılı");

setTimeout(()=>{
window.location.href="berberpanel.html";
},500);

}catch(e){
mesaj("error","Hata: "+e.message);
console.error(e);
}

}

</script>

</body>
</html>
