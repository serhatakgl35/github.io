<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Berber Paneli</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;background:#f5f5f7;color:#111}

.topbar{
  position:sticky;top:0;background:#111;color:#fff;padding:14px 18px;z-index:50
}
.topbar-inner{
  max-width:1050px;margin:auto;display:flex;align-items:center;justify-content:space-between
}
.brand{font-weight:800}
.logout-btn{
  border:none;background:#fff;color:#111;padding:10px 16px;border-radius:999px;
  font-weight:800;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.25);transition:.2s
}
.logout-btn:hover{transform:translateY(-1px)}

.container{max-width:1050px;margin:20px auto;padding:0 16px}

.hero{
  background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 28px rgba(0,0,0,.08);margin-bottom:14px
}
.hero h2{margin:0 0 6px}

.status{
  background:#fff;border-radius:16px;padding:12px 14px;box-shadow:0 6px 18px rgba(0,0,0,.06);
  margin-bottom:12px;color:#555;font-size:14px
}

.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px
}

.card{
  background:#fff;border-radius:22px;padding:16px;
  box-shadow:0 10px 28px rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.04)
}

.time{font-size:22px;font-weight:900;margin-bottom:6px}
.date{font-size:14px;color:#555;margin-bottom:10px;font-weight:700}

.info{font-size:14px;line-height:1.7}
.info b{color:#111}

.badge{
  display:inline-block;margin-top:10px;padding:6px 10px;border-radius:999px;
  background:#e0f2f1;color:#00695c;font-weight:900;font-size:12px
}

.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{border:none;border-radius:12px;padding:10px 12px;font-weight:800;cursor:pointer}
.delete{background:#c62828;color:#fff}
.wa{background:#128c7e;color:#fff}

.empty{
  background:#fff;border-radius:22px;padding:28px;text-align:center;color:#666;
  box-shadow:0 10px 28px rgba(0,0,0,.07)
}

@media (max-width:600px){
  .actions .btn{width:100%}
}
</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">✂️ Berber Paneli</div>
    <button class="logout-btn" onclick="cikis()">Çıkış Yap</button>
  </div>
</div>

<div class="container">
  <div class="hero">
    <h2 id="hosgeldin">Hoş geldin</h2>
    <div style="margin-top:10px">
      <button class="btn" onclick="yukle()">Randevuları Yenile</button>
      <button class="btn" style="background:#e9e9ee;color:#111" onclick="bugun()">Bugünkü Randevular</button>
      <button class="btn secondary" onclick="window.location.href='berbertakvim.html'">Haftalık Takvim</button>
<button class="btn secondary" onclick="window.location.href='berbergunkapat.html'">Gün / Saat Kapat</button>
    </div>
  </div>

  <div id="durum" class="status">Yükleniyor...</div>
  <div id="liste" class="grid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain:"berber-randevu-14f7f.firebaseapp.com",
  projectId:"berber-randevu-14f7f",
  storageBucket:"berber-randevu-14f7f.firebasestorage.app",
  messagingSenderId:"280530860977",
  appId:"1:280530860977:web:52c0df04c228896f211b90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const liste = document.getElementById("liste");
const durum = document.getElementById("durum");
const hosgeldin = document.getElementById("hosgeldin");

/* 🔐 Giriş kontrolü */
const girisVar = localStorage.getItem("berberGiris");
if (girisVar !== "true") {
  location.href = "berbergiris.html";
}

hosgeldin.innerText = "Hoş geldin, " + (localStorage.getItem("berberAdSoyad") || "Berber");

/* 📅 dd/mm/yyyy */
function tarihFormatla(t){
  if(!t) return "-";
  const p = String(t).split("-");
  if(p.length !== 3) return t;
  return `${p[2]}/${p[1]}/${p[0]}`;
}

/* 📞 tel yardımcıları */
function temizTel(t){
  t = String(t||"").replace(/\D/g,"");
  if(t.startsWith("90")) t=t.substring(2);
  if(t.length===10 && t.startsWith("5")) t="0"+t;
  return t;
}
function waTel(t){
  t = temizTel(t);
  if(t.startsWith("0")) t="90"+t.substring(1);
  return t;
}

/* 💬 WhatsApp mesajı */
function mesaj(r){
return `J.Uzm.Çvş.Bünyamin ÖDEMİŞ
Berber Görevlisi

Sayın ${r.ad}, ${tarihFormatla(r.tarih)} ${r.saat} randevunuz görev sebebiyle iptal edilmiştir. Berber tarafından iptal edilen randevularda 9 gün engeli yoktur. En yakın zamanda tekrar randevu almanız gerekmektedir. Arz / Rica Ederim.`;
}

/* 🔎 veri normalize */
function mapR(d, id){
  const r = d;
  return {
    id,
    tarih: r.date || r.tarih || r.kayitTarih,
    saat:  r.time || r.saat || r.zaman || r.kayitSaat,
    ad:    r.name || r.isim || r.adSoyad || r.kayitAd,
    telefon: r.phone || r.telefon || r.kayitTelefon,
    hizmet: r.service || r.hizmet || r.kayitHizmet
  };
}

/* 📥 yükle */
async function fetchAll(){
  const snap = await getDocs(collection(db,"randevular"));
  let arr = [];
  snap.forEach(d=>{
    const r = mapR(d.data(), d.id);
    arr.push(r);
  });

  /* 🚫 boş kayıtları at */
  arr = arr.filter(r => r.tarih && r.saat && r.ad && r.telefon);

  /* 🔃 sırala */
  arr.sort((a,b)=> (a.tarih+" "+a.saat).localeCompare(b.tarih+" "+b.saat));
  return arr;
}

/* 🧱 render */
function render(list){
  liste.innerHTML = "";

  if(!list.length){
    durum.innerText = "Randevu bulunamadı.";
    liste.innerHTML = `<div class="empty">Gösterilecek randevu yok.</div>`;
    return;
  }

  durum.innerText = `${list.length} randevu bulundu.`;

  list.forEach(r=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <div class="time">${r.saat || "-"}</div>
      <div class="date">${tarihFormatla(r.tarih)}</div>

      <div class="info">
        <div><b>Müşteri:</b> ${r.ad || "-"}</div>
        <div><b>Telefon:</b> ${r.telefon || "-"}</div>
        <div><b>Hizmet:</b> ${r.hizmet || "-"}</div>
      </div>

      <span class="badge">AKTİF</span>

      <div class="actions">
        <button class="btn delete" onclick="sil('${r.id}')">Randevu Sil</button>
        <button class="btn wa" onclick="silMesaj('${r.id}')">Sil ve Mesaj At</button>
      </div>
    `;

    div.dataset.r = JSON.stringify(r);
    liste.appendChild(div);
  });
}

/* 🔁 genel yükle */
window.yukle = async function(){
  try{
    durum.innerText = "Yükleniyor...";
    const data = await fetchAll();
    render(data);
  }catch(e){
    console.error(e);
    durum.innerText = "Veri alınamadı. Firestore Rules / config kontrol et.";
  }
}

/* 📆 bugünkü */
window.bugun = async function(){
  try{
    durum.innerText = "Yükleniyor...";
    const data = await fetchAll();
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth()+1).padStart(2,"0");
    const d = String(today.getDate()).padStart(2,"0");
    const t = `${y}-${m}-${d}`;
    render(data.filter(x=> x.tarih === t));
  }catch(e){
    console.error(e);
    durum.innerText = "Veri alınamadı.";
  }
}

/* 🗑️ sil */
window.sil = async function(id){
  if(!confirm("Randevu silinsin mi?")) return;
  try{
    await deleteDoc(doc(db,"randevular",id));
    await yukle();
  }catch(e){
    console.error(e);
    alert("Silme hatası");
  }
}

/* 🗑️ + 💬 */
window.silMesaj = async function(id){
  const kart = [...document.querySelectorAll(".card")]
    .find(k => JSON.parse(k.dataset.r).id === id);

  if(!kart){ alert("Kayıt bulunamadı"); return; }

  const r = JSON.parse(kart.dataset.r);

  try{
    await deleteDoc(doc(db,"randevular",id));

    const tel = waTel(r.telefon);
    const msg = encodeURIComponent(mesaj(r));

    if(!tel || tel.length < 12){
      alert("Telefon geçersiz, sadece silindi.");
      await yukle();
      return;
    }

    window.open(`https://wa.me/${tel}?text=${msg}`, "_blank");
    await yukle();

  }catch(e){
    console.error(e);
    alert("İşlem hatası");
  }
}

/* 🚪 çıkış */
window.cikis = function(){
  localStorage.clear();
  location.href = "berbergiris.html";
}

/* 🚀 init */
yukle();
</script>

</body>
</html>
