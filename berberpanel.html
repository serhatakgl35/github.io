<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Berber Paneli</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;background:#f5f5f7;color:#111}
.topbar{position:sticky;top:0;background:#111;color:#fff;padding:14px 18px;z-index:50}
.topbar-inner{max-width:1150px;margin:auto;display:flex;align-items:center;justify-content:space-between}
.brand{font-weight:900}
.logout-btn{border:none;background:#fff;color:#111;padding:10px 18px;border-radius:999px;font-weight:900;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.22)}
.container{max-width:1150px;margin:20px auto;padding:0 16px}
.hero,.calendar-box{background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 28px rgba(0,0,0,.08);margin-bottom:16px}
.hero h2,.calendar-box h2{margin:0 0 8px}
.btn{border:none;border-radius:13px;padding:11px 13px;font-weight:900;cursor:pointer;background:#111;color:#fff}
.btn.secondary{background:#e9e9ee;color:#111}
.status{background:#fff;border-radius:16px;padding:12px 14px;box-shadow:0 6px 18px rgba(0,0,0,.06);margin-bottom:14px;color:#555}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.card{background:#fff;border-radius:22px;padding:16px;box-shadow:0 10px 28px rgba(0,0,0,.08)}
.time{font-size:22px;font-weight:900;margin-bottom:6px}
.date{font-size:14px;color:#555;margin-bottom:10px;font-weight:700}
.info{font-size:14px;line-height:1.7}
.badge{display:inline-block;margin-top:10px;padding:6px 10px;border-radius:999px;background:#e0f2f1;color:#00695c;font-weight:900;font-size:12px}
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.delete{background:#c62828;color:#fff}
.wa{background:#128c7e;color:#fff}
.empty{background:#fff;border-radius:22px;padding:24px;text-align:center;color:#666;box-shadow:0 10px 28px rgba(0,0,0,.07)}
.calendar-controls{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.hafta-yazi{background:#f3f3f3;border:1px solid #ddd;border-radius:12px;padding:10px;text-align:center;font-weight:900;margin-bottom:12px}
.tablo-wrap{overflow-x:auto;border-radius:14px;border:1px solid #ddd;background:white}
table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:820px}
th,td{border:1px solid #ddd;padding:7px 5px;text-align:center;vertical-align:middle}
thead th{background:#ececec;font-size:12px}
.saat-baslik{width:70px;background:#f4f4f4;font-weight:900}
.musait{background:#dff3df;color:#146214;font-weight:900;font-size:12px}
.dolu{background:#ffd9d9;color:#8b0000;font-size:11px}
.kapali,.gecmis{background:#e4e4e4;color:#666;font-weight:900;font-size:12px}
.dolu-isim{font-weight:900;font-size:12px;margin-bottom:3px}
.dolu-mini{font-size:10px;line-height:1.25;word-break:break-word}
.etiket{display:inline-block;margin-top:4px;padding:2px 6px;border-radius:999px;font-size:9px;font-weight:900}
.etiket-dolu{background:#ffbcbc;color:#8b0000}
.etiket-musait{background:#c9eec9;color:#146214}
.etiket-kapali,.etiket-gecmis{background:#d6d6d6;color:#555}
@media(max-width:600px){.actions .btn,.calendar-controls .btn{width:100%}table{min-width:760px}}
</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">✂️ Berber Paneli</div>
    <button class="logout-btn" onclick="cikis()">Çıkış Yap</button>
  </div>
</div>

<div class="container">
  <div class="hero">
    <h2 id="hosgeldin">Hoş geldin</h2>
    <div class="actions">
      <button class="btn" onclick="yukle()">Randevuları Yenile</button>
      <button class="btn secondary" onclick="bugunKartlari()">Bugünün Randevuları</button>
      <button class="btn secondary" onclick="location.href='https://www.kantin10.com.tr/berbertakvim.html'">Takvim</button>
      <button class="btn secondary" onclick="location.href='https://www.kantin10.com.tr/berbergunkapat.html'">Gün/Saat Kapat</button>
    </div>
  </div>

  <div id="durum" class="status" style="display:none;">Yükleniyor...</div>
  <div id="liste" class="grid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain:"berber-randevu-14f7f.firebaseapp.com",
  projectId:"berber-randevu-14f7f",
  storageBucket:"berber-randevu-14f7f.firebasestorage.app",
  messagingSenderId:"280530860977",
  appId:"1:280530860977:web:52c0df04c228896f211b90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const liste = document.getElementById("liste");
const durum = document.getElementById("durum");
const hosgeldin = document.getElementById("hosgeldin");

if(localStorage.getItem("berberGiris") !== "true"){
  location.href="berbergiris.html";
}

hosgeldin.innerText = "Hoş geldin, " + (localStorage.getItem("berberAdSoyad") || "Berber");

let sonData = [];

function esc(x){
  return String(x || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function iki(n){return String(n).padStart(2,"0");}

function tarihKey(d){
  return d.getFullYear()+"-"+iki(d.getMonth()+1)+"-"+iki(d.getDate());
}

function tarihFormatla(t){
  if(!t) return "-";
  const p=String(t).split("-");
  if(p.length!==3) return t;
  return `${p[2]}/${p[1]}/${p[0]}`;
}

function tarihGoster(d){
  return iki(d.getDate())+"/"+iki(d.getMonth()+1)+"/"+d.getFullYear();
}

function pazartesiBul(t){
  const d=new Date(t);
  d.setHours(0,0,0,0);
  const gun=d.getDay();
  const fark=gun===0 ? -6 : 1-gun;
  d.setDate(d.getDate()+fark);
  return d;
}

function haftaGunleri(baslangic){
  const arr=[];
  for(let i=0;i<5;i++){
    const d=new Date(baslangic);
    d.setDate(baslangic.getDate()+i);
    arr.push(d);
  }
  return arr;
}

function bugunKey(){
  return tarihKey(new Date());
}

function gecmisMi(tarih,saat){
  if(!tarih || !saat) return false;
  const dt = new Date(`${tarih}T${saat}:00`);
  const limit = new Date(dt);
  limit.setMinutes(limit.getMinutes()+1);
  return new Date() >= limit;
}

function temizTel(t){
  t=String(t||"").replace(/\D/g,"");
  if(t.startsWith("90")) t=t.substring(2);
  if(t.length===10 && t.startsWith("5")) t="0"+t;
  return t;
}

function waTel(t){
  t=temizTel(t);
  if(t.startsWith("0")) t="90"+t.substring(1);
  return t;
}

function mesaj(r){
return `✂️ J.Uzm.Çvş.Bünyamin ÖDEMİŞ

👨‍🔧 Berber Görevlisi

📌 Sayın ${r.ad},
📅 ${tarihFormatla(r.tarih)} ⏰ ${r.saat} randevunuz görev sebebiyle iptal edilmiştir.

Berber tarafından iptal edilen randevularda 9 gün engeli yoktur. En yakın zamanda tekrar randevu almanız gerekmektedir.

Arz / Rica Ederim.`;
}

function normalize(d,id){
  return {
    id,
    tarih: d.date || d.tarih || d.kayitTarih || "",
    saat: d.time || d.saat || d.zaman || d.kayitSaat || "",
    ad: d.name || d.isim || d.adSoyad || d.kayitAd || "",
    telefon: d.phone || d.telefon || d.kayitTelefon || "",
    hizmet: d.service || d.hizmet || d.kayitHizmet || ""
  };
}

async function fetchAll(){
  const snap = await getDocs(collection(db,"randevular"));
  let arr=[];
  snap.forEach(x=>arr.push(normalize(x.data(),x.id)));
  arr = arr.filter(r=>r.tarih && r.saat && r.ad && r.telefon);
  arr.sort((a,b)=>(a.tarih+" "+a.saat).localeCompare(b.tarih+" "+b.saat));
  return arr;
}

function renderKartlar(data){
  liste.innerHTML="";
  if(!data.length){
    durum.innerText="Randevu bulunamadı.";
    liste.innerHTML=`<div class="empty">Gösterilecek randevu yok.</div>`;
    return;
  }

  durum.innerText=`${data.length} randevu bulundu.`;

  data.forEach(r=>{
    const div=document.createElement("div");
    div.className="card";
    div.dataset.r=JSON.stringify(r);

    div.innerHTML=`
      <div class="time">${esc(r.saat)}</div>
      <div class="date">${esc(tarihFormatla(r.tarih))}</div>
      <div class="info">
        <div><b>Müşteri:</b> ${esc(r.ad)}</div>
        <div><b>Telefon:</b> ${esc(r.telefon)}</div>
        <div><b>Hizmet:</b> ${esc(r.hizmet || "-")}</div>
      </div>
      <span class="badge">${gecmisMi(r.tarih,r.saat) ? "SAATİ GEÇTİ" : "AKTİF"}</span>
      <div class="actions">
        <button class="btn delete" onclick="sil('${r.id}')">Randevu Sil</button>
        <button class="btn wa" onclick="silMesaj('${r.id}')">Sil ve Mesaj At</button>
      </div>
    `;
    liste.appendChild(div);
  });
}

window.yukle = async function(){
  try{
    durum.innerText="Yükleniyor...";
    sonData = await fetchAll();
    renderKartlar(sonData);
  }catch(e){
    console.error(e);
    durum.innerText="Veri alınamadı. Firestore Rules / config kontrol et.";

  }
}

window.bugunKartlari = function(){
  renderKartlar(sonData.filter(r=>r.tarih===bugunKey()));
}

window.tumKartlari = function(){
  renderKartlar(sonData);
}

window.sil = async function(id){
  if(!confirm("Randevu silinsin mi?")) return;
  await deleteDoc(doc(db,"randevular",id));
  await yukle();
}

window.silMesaj = async function(id){
  const r = sonData.find(x=>x.id===id);
  if(!r){ alert("Kayıt bulunamadı."); return; }

  await deleteDoc(doc(db,"randevular",id));

  const tel = waTel(r.telefon);
  if(!tel || tel.length<12){
    alert("Telefon geçersiz, sadece silindi.");
    await yukle();
    return;
  }

  window.open(`https://wa.me/${tel}?text=${encodeURIComponent(mesaj(r))}`,"_blank");
  await yukle();
}

window.cikis = function(){
  localStorage.clear();
  location.href="berbergiris.html";
}

yukle();
</script>

</body>
</html>
