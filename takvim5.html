<!DOCTYPE html>
<html lang="tr">
<head>

  <style>

    .hafta-yazi {

    table {

    @media (max-width: 600px) {

    .musait-slot {

    .musait-slot:hover {

    .musait-slot:active {

    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.42);
      display: none;
      align-items: center;
      justify-content: center;

      padding: 18px;

    }

    .popup-overlay.active {

    .popup-box {

      border: 1px solid rgba(255,255,255,0.65);

    .popup-title {
      font-size: 18px;

    .popup-actions {

    .popup-actions button {

    }

    .popup-cancel {

    }

    .popup-ok {
      background: #111;

  </style>
</head>
<body>
  <div class="page">
    <div class="box">
      <h1>Haftalık Randevu Paneli</h1>

      <div class="info">
        Pazartesi - Cuma arası tablo görünümü.
        <strong>Yeşil = Müsait</strong>,
        <strong>Kırmızı = Dolu</strong>,
        <strong>Gri = Kapalı / Geçmiş</strong>
      </div>

      <div class="ust-bar">
        <div class="butonlar">
          <button id="oncekiHaftaBtn" type="button">← Önceki</button>
          <button id="bugunHaftaBtn" type="button">Bu Hafta</button>
          <button id="yenileBtn" type="button">Yenile</button>
          <button id="sonrakiHaftaBtn" type="button">Sonraki →</button>
        </div>

        <div id="haftaYazi" class="hafta-yazi">Yükleniyor...</div>
      </div>

      <div class="tablo-wrap">
        <div id="tabloAlan">
          <div class="yukleniyor">Yükleniyor...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="randevuPopup" class="popup-overlay" aria-hidden="true">
    <div class="popup-box" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
      <div id="popupTitle" class="popup-title">Randevu Onayı</div>
      <div id="popupText" class="popup-text">Bu saate randevu almak istiyor musunuz?</div>
      <div class="popup-actions">
        <button id="popupCancelBtn" class="popup-cancel" type="button">İptal</button>
        <button id="popupOkBtn" class="popup-ok" type="button">Evet, devam et</button>
      </div>
    </div>
  </div>


  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where,
      documentId
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
      authDomain: "berber-randevu-14f7f.firebaseapp.com",
      projectId: "berber-randevu-14f7f",
      storageBucket: "berber-randevu-14f7f.firebasestorage.app",
      messagingSenderId: "280530860977",
      appId: "1:280530860977:web:52c0df04c228896f211b90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const KOLEKSIYON = "randevular";
    const KAPALI_GUNLER_KOLEKSIYON = "kapali_gunler";
    const KAPALI_SAATLER_KOLEKSIYON = "kapali_saatler";
    const OTOMATIK_GECMIS_DAKIKA = 1;
    // Bugün dahil toplam 10 günlük randevu penceresi: bugün + 9 gün.
    const MAKSIMUM_RANDEVU_GUNU = 9;

    const SAATLER = [
      "09:00",
      "09:50",
      "10:30",
      "11:20",
      "13:20",
      "14:00",
      "14:50",
      "15:30"
    ];

    const GUN_ADLARI = ["Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma"];

    const RESMI_TATILLER_2026 = [
      "2026-01-01",
      "2026-03-19",
      "2026-03-20",
      "2026-03-21",
      "2026-03-22",
      "2026-04-23",
      "2026-05-01",
      "2026-05-19",
      "2026-05-26",
      "2026-05-27",
      "2026-05-28",
      "2026-05-29",
      "2026-05-30",
      "2026-07-15",
      "2026-08-30",
      "2026-10-28",
      "2026-10-29"
    ];

    const haftaYaziEl = document.getElementById("haftaYazi");
    const tabloAlanEl = document.getElementById("tabloAlan");
    const oncekiHaftaBtn = document.getElementById("oncekiHaftaBtn");
    const bugunHaftaBtn = document.getElementById("bugunHaftaBtn");
    const sonrakiHaftaBtn = document.getElementById("sonrakiHaftaBtn");
    const yenileBtn = document.getElementById("yenileBtn");
    const randevuPopupEl = document.getElementById("randevuPopup");
    const popupTextEl = document.getElementById("popupText");
    const popupCancelBtn = document.getElementById("popupCancelBtn");
    const popupOkBtn = document.getElementById("popupOkBtn");

    let aktifHaftaBaslangici = pazartesiBul(new Date());
    let popupSeciliTarih = "";
    let popupSeciliSaat = "";

    function ikiHane(n) {
      return String(n).padStart(2, "0");
    }

    function tarihKeyYap(dateObj) {
      const y = dateObj.getFullYear();
      const m = ikiHane(dateObj.getMonth() + 1);
      const d = ikiHane(dateObj.getDate());
      return y + "-" + m + "-" + d;
    }

    function tarihGoster(dateObj) {
      return ikiHane(dateObj.getDate()) + "." + ikiHane(dateObj.getMonth() + 1) + "." + dateObj.getFullYear();
    }

    function pazartesiBul(tarih) {
      const d = new Date(tarih);
      d.setHours(0, 0, 0, 0);
      const gun = d.getDay();
      const fark = gun === 0 ? -6 : 1 - gun;
      d.setDate(d.getDate() + fark);
      return d;
    }

    function haftaninBesGunu(baslangic) {
      const gunler = [];
      for (let i = 0; i < 5; i++) {
        const d = new Date(baslangic);
        d.setDate(baslangic.getDate() + i);
        gunler.push(d);
      }
      return gunler;
    }

    function haftaYazisiUret(gunler) {
      return tarihGoster(gunler[0]) + " - " + tarihGoster(gunler[4]);
    }

    function bugunSifir() {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function maksimumRandevuTarihi() {
      const d = bugunSifir();
      d.setDate(d.getDate() + MAKSIMUM_RANDEVU_GUNU);
      return d;
    }

    function gunRandevuAraligindaMi(gun) {
      const kontrol = new Date(gun);
      kontrol.setHours(0, 0, 0, 0);
      return kontrol >= bugunSifir() && kontrol <= maksimumRandevuTarihi();
    }

    function haftaRandevuAraligindaGunIceriyorMu(haftaBaslangici) {
      return haftaninBesGunu(haftaBaslangici).some(gunRandevuAraligindaMi);
    }

    function minTarihKey(a, b) {
      return a < b ? a : b;
    }

    function maxTarihKey(a, b) {
      return a > b ? a : b;
    }

    function navigasyonButonlariniGuncelle() {
      const onceki = new Date(aktifHaftaBaslangici);
      onceki.setDate(onceki.getDate() - 7);

      const sonraki = new Date(aktifHaftaBaslangici);
      sonraki.setDate(sonraki.getDate() + 7);

      oncekiHaftaBtn.disabled = !haftaRandevuAraligindaGunIceriyorMu(onceki);
      sonrakiHaftaBtn.disabled = !haftaRandevuAraligindaGunIceriyorMu(sonraki);
      bugunHaftaBtn.disabled = tarihKeyYap(aktifHaftaBaslangici) === tarihKeyYap(pazartesiBul(new Date()));
    }

    function popupAc(tarih, saat) {
      popupSeciliTarih = tarih || "";
      popupSeciliSaat = saat || "";

      popupTextEl.innerHTML =
        '<strong>' + popupSeciliTarih + '</strong> tarihinde <strong>' + popupSeciliSaat + '</strong> saatine randevu almak istiyor musunuz?';

      randevuPopupEl.classList.add("active");
      randevuPopupEl.setAttribute("aria-hidden", "false");
    }

    function popupKapat() {
      randevuPopupEl.classList.remove("active");
      randevuPopupEl.setAttribute("aria-hidden", "true");
      popupSeciliTarih = "";
      popupSeciliSaat = "";
    }

    function randevuSayfasinaGit() {
      if (!popupSeciliTarih || !popupSeciliSaat) return;
      const url = "randevu.html?date=" + encodeURIComponent(popupSeciliTarih) + "&time=" + encodeURIComponent(popupSeciliSaat);
      window.location.href = url;
    }

    function kayitTarih(data) {
      return data.date || data.tarih || "";
    }

    function kayitSaat(data) {
      return data.time || data.zaman || "";
    }

    function kayitAd(data) {
      return data.name || data.isim || "";
    }

    function kayitTelefon(data) {
      return data.phone || data.telefon || "";
    }

    function kayitHizmet(data) {
      return data.service || data.hizmet || "";
    }

    function parseAppointmentDateTime(dateStr, timeStr) {
      if (!dateStr || !timeStr) return null;

      const d = String(dateStr).split("-").map(Number);
      const t = String(timeStr).split(":").map(Number);

      if (d.length !== 3 || t.length !== 2) return null;
      if (d.some(isNaN) || t.some(isNaN)) return null;

      return new Date(d[0], d[1] - 1, d[2], t[0], t[1], 0, 0);
    }

    function slotGecmisMi(tarih, saat, now = new Date()) {
      const baslangic = parseAppointmentDateTime(tarih, saat);
      if (!baslangic) return false;

      const limit = new Date(baslangic);
      limit.setMinutes(limit.getMinutes() + OTOMATIK_GECMIS_DAKIKA);

      return now >= limit;
    }

    function randevuGecmisMi(data, now = new Date()) {
      const tarih = kayitTarih(data);
      const saat = kayitSaat(data);
      return slotGecmisMi(tarih, saat, now);
    }

    function haftaSonuMu(tarih) {
      if (!tarih) return false;
      const p = String(tarih).split("-").map(Number);
      const t = new Date(p[0], p[1] - 1, p[2], 12, 0, 0, 0);
      const gun = t.getDay();
      return gun === 0 || gun === 6;
    }

    function resmiTatilMi2026(tarih) {
      return RESMI_TATILLER_2026.includes(tarih);
    }

    function otomatikKapaliGunMu(tarih) {
      return haftaSonuMu(tarih) || resmiTatilMi2026(tarih);
    }

    async function haftalikVerileriHazirla(gunler) {
      const ilkGun = tarihKeyYap(gunler[0]);
      const sonGun = tarihKeyYap(gunler[4]);
      const bugunKey = tarihKeyYap(bugunSifir());
      const maksimumKey = tarihKeyYap(maksimumRandevuTarihi());
      const sorguIlkGun = maxTarihKey(ilkGun, bugunKey);
      const sorguSonGun = minTarihKey(sonGun, maksimumKey);
      const sorguYapilabilir = sorguIlkGun <= sorguSonGun;

      const randevuMap = {};
      const gunKapaliMap = {};
      const kapaliSaatMap = {};
      const simdi = new Date();

      gunler.forEach(function(gun) {
        if (gun < bugunSifir()) return;
        const tarih = tarihKeyYap(gun);
        if (!gunRandevuAraligindaMi(gun)) {
          gunKapaliMap[tarih] = true;
          kapaliSaatMap[tarih] = [];
          return;
        }
        gunKapaliMap[tarih] = otomatikKapaliGunMu(tarih);
        kapaliSaatMap[tarih] = [];
      });

      try {
        if (sorguYapilabilir) {
          const kapaliGunQ = query(
            collection(db, KAPALI_GUNLER_KOLEKSIYON),
            where(documentId(), ">=", sorguIlkGun),
            where(documentId(), "<=", sorguSonGun)
          );

          const kapaliGunSnap = await getDocs(kapaliGunQ);
          kapaliGunSnap.forEach(function(docItem) {
            gunKapaliMap[docItem.id] = true;
          });
        }
      } catch (error) {
        console.error("Kapalı günler alınamadı:", error);
      }

      try {
        if (sorguYapilabilir) {
          const kapaliSaatQ = query(
            collection(db, KAPALI_SAATLER_KOLEKSIYON),
            where("tarih", ">=", sorguIlkGun),
            where("tarih", "<=", sorguSonGun)
          );

          const kapaliSaatSnap = await getDocs(kapaliSaatQ);
          kapaliSaatSnap.forEach(function(docItem) {
            const data = docItem.data();
            const tarih = data.tarih || data.date || "";
            const saat = data.saat || data.time || data.zaman || "";

            if (!tarih || !saat) return;
            if (!kapaliSaatMap[tarih]) kapaliSaatMap[tarih] = [];
            kapaliSaatMap[tarih].push(saat);
          });
        }
      } catch (error) {
        console.error("Kapalı saatler alınamadı:", error);
      }

      async function randevuSorgula(tarihAlani) {
        if (!sorguYapilabilir) return null;
        try {
          const q = query(
            collection(db, KOLEKSIYON),
            where(tarihAlani, ">=", sorguIlkGun),
            where(tarihAlani, "<=", sorguSonGun)
          );

          return await getDocs(q);
        } catch (error) {
          console.error(tarihAlani + " alanı ile randevu alınamadı:", error);
          return null;
        }
      }

      const randevuSnapTarih = await randevuSorgula("tarih");
      const randevuSnapDate = await randevuSorgula("date");
      const gorulenDoclar = new Set();

      function randevuSnapIsle(snap) {
        if (!snap) return;

        snap.forEach(function(docItem) {
          if (gorulenDoclar.has(docItem.id)) return;
          gorulenDoclar.add(docItem.id);

          const data = docItem.data();

          const tarih = kayitTarih(data);
          const saat = kayitSaat(data);
          const isim = kayitAd(data) || "-";
          const telefon = kayitTelefon(data) || "-";
          const hizmet = kayitHizmet(data) || "-";
          const gecmisMi = randevuGecmisMi(data, simdi);

          if (!tarih || !saat) return;
          if (tarih < sorguIlkGun || tarih > sorguSonGun) return;

          const key = tarih + "_" + saat;
          randevuMap[key] = {
            isim,
            telefon,
            hizmet,
            gecmis: gecmisMi
          };
        });
      }

      randevuSnapIsle(randevuSnapTarih);
      randevuSnapIsle(randevuSnapDate);

      return {
        randevuMap,
        gunKapaliMap,
        kapaliSaatMap
      };
    }

    function tabloHTMLUret(gunler, randevuMap, gunKapaliMap, kapaliSaatMap) {
      let html = "<table>";
      html += "<colgroup>";
      html += '<col class="saat-col">';
      gunler.forEach(function(gun) {
        if (gun < bugunSifir()) return;
        html += '<col class="gun-col">';
      });
      html += "</colgroup>";
      html += "<thead><tr>";
      html += '<th class="saat-baslik">Saat</th>';

      gunler.forEach(function(gun, i) {
        if (gun < bugunSifir()) return;
        const tarih = tarihKeyYap(gun);
        const aralikDisi = !gunRandevuAraligindaMi(gun);
        const kapaliGun = !!gunKapaliMap[tarih] || aralikDisi;

        html += '<th class="gun-baslik' + (kapaliGun ? ' kapali-gun-baslik' : '') + '">';
        html += '<div class="gun-adi">' + GUN_ADLARI[i] + "</div>";
        html += '<div class="gun-tarih">' + tarihGoster(gun) + "</div>";
        if (aralikDisi) {
          html += '<div class="etiket etiket-kapali">10 GÜN DIŞI</div>';
        } else if (kapaliGun) {
          html += '<div class="etiket etiket-kapali">KAPALI GÜN</div>';
        }
        html += "</th>";
      });

      html += "</tr></thead><tbody>";

      const simdi = new Date();

      SAATLER.forEach(function(saat) {
        html += "<tr>";
        html += '<td class="saat-baslik">' + saat + "</td>";

        gunler.forEach(function(gun) {
          if (gun < bugunSifir()) return;
          const tarih = tarihKeyYap(gun);
          const key = tarih + "_" + saat;
          const aralikDisi = !gunRandevuAraligindaMi(gun);

          const kapaliGun = !!gunKapaliMap[tarih];
          const kapaliSaatler = kapaliSaatMap[tarih] || [];
          const kapaliSaat = kapaliSaatler.includes(saat);
          const r = randevuMap[key];
          const slotGecmis = slotGecmisMi(tarih, saat, simdi);

          if (aralikDisi) {
            html += '<td class="kapali">';
            html += "<div>KAPALI</div>";
            html += '<div class="etiket etiket-kapali">10 GÜN DIŞI</div>';
            html += "</td>";
          } else if (kapaliGun) {
            html += '<td class="kapali">';
            html += "<div>KAPALI</div>";
            html += '<div class="etiket etiket-kapali">GÜN</div>';
            html += "</td>";
          } else if (kapaliSaat) {
            html += '<td class="kapali">';
            html += "<div>KAPALI</div>";
            html += '<div class="etiket etiket-kapali">SAAT</div>';
            html += "</td>";
          } else if (r) {
            if (r.gecmis) {
              html += '<td class="gecmis">';
              html += "<div>GEÇMİŞ</div>";
              html += '<div class="etiket etiket-gecmis">GEÇMİŞ</div>';
              html += "</td>";
            } else {
              html += '<td class="dolu">';
              html += "<div>DOLU</div>";
              html += '<div class="etiket etiket-dolu">DOLU</div>';
              html += "</td>";
            }
          } else if (slotGecmis) {
            html += '<td class="gecmis">';
            html += "<div>GEÇMİŞ</div>";
            html += '<div class="etiket etiket-gecmis">SÜRE GEÇTİ</div>';
            html += "</td>";
          } else {
            html += '<td class="musait musait-slot" data-date="' + tarih + '" data-time="' + saat + '">';
            html += "<div>MÜSAİT</div>";
            html += '<div class="etiket etiket-musait">RANDEVU AL</div>';
            html += "</td>";
          }
        });

        html += "</tr>";
      });

      html += "</tbody></table>";
      return html;
    }

    async function paneliCiz() {
      try {
        tabloAlanEl.innerHTML = '<div class="yukleniyor">Yükleniyor...</div>';

        const gunler = haftaninBesGunu(aktifHaftaBaslangici);
        haftaYaziEl.textContent = haftaYazisiUret(gunler);

        const veriler = await haftalikVerileriHazirla(gunler);

        tabloAlanEl.innerHTML = tabloHTMLUret(
          gunler,
          veriler.randevuMap,
          veriler.gunKapaliMap,
          veriler.kapaliSaatMap
        );
        navigasyonButonlariniGuncelle();
      } catch (err) {
        console.error("Panel yükleme hatası:", err);
        tabloAlanEl.innerHTML = '<div class="hata">Panel yüklenirken hata oluştu.</div>';
      }
    }



    tabloAlanEl.addEventListener("click", function(event) {
      const slot = event.target.closest(".musait-slot");
      if (!slot) return;

      const tarih = slot.dataset.date || "";
      const saat = slot.dataset.time || "";
      if (!tarih || !saat) return;

      popupAc(tarih, saat);
    });

    popupCancelBtn.addEventListener("click", popupKapat);
    popupOkBtn.addEventListener("click", randevuSayfasinaGit);

    randevuPopupEl.addEventListener("click", function(event) {
      if (event.target === randevuPopupEl) popupKapat();
    });

    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape" && randevuPopupEl.classList.contains("active")) {
        popupKapat();
      }
    });

    oncekiHaftaBtn.addEventListener("click", async function() {
      const onceki = new Date(aktifHaftaBaslangici);
      onceki.setDate(onceki.getDate() - 7);
      if (!haftaRandevuAraligindaGunIceriyorMu(onceki)) return;
      aktifHaftaBaslangici = onceki;
      await paneliCiz();
    });

    bugunHaftaBtn.addEventListener("click", async function() {
      aktifHaftaBaslangici = pazartesiBul(new Date());
      await paneliCiz();
    });

    sonrakiHaftaBtn.addEventListener("click", async function() {
      const sonraki = new Date(aktifHaftaBaslangici);
      sonraki.setDate(sonraki.getDate() + 7);
      if (!haftaRandevuAraligindaGunIceriyorMu(sonraki)) return;
      aktifHaftaBaslangici = sonraki;
      await paneliCiz();
    });

    yenileBtn.addEventListener("click", async function() {
      await paneliCiz();
    });

    async function sistemBaslat() {
      await paneliCiz();
    }

    sistemBaslat();
  </script>
</body>
</html>
