<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ödeme Admin Paneli</title><style>
*{box-sizing:border-box}
:root{--bg:#f5f5f7;--text:#111;--muted:#666;--shadow:0 18px 55px rgba(0,0,0,.10);--soft:0 8px 25px rgba(0,0,0,.08);--r:26px}
body{margin:0;min-height:100vh;color:var(--text);background:radial-gradient(circle at 20% 10%,rgba(255,255,255,.95),transparent 32%),radial-gradient(circle at 80% 0%,rgba(225,229,238,.9),transparent 35%),var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif}
.topbar{position:sticky;top:0;z-index:20;background:rgba(17,17,17,.94);padding:14px 18px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;box-shadow:0 4px 18px rgba(0,0,0,.18);backdrop-filter:blur(16px)}
.topbar a,.topbar button{background:white;color:#111;text-decoration:none;border:0;border-radius:999px;padding:9px 15px;font-weight:900;cursor:pointer}
.wrap{width:min(1180px,100%);margin:28px auto;padding:0 16px}
.centerWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:rgba(255,255,255,.90);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);backdrop-filter:blur(18px);margin-bottom:18px}
.loginCard{width:100%;max-width:430px}.logo{width:62px;height:62px;border-radius:20px;background:#111;color:white;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
h1{font-size:34px;margin:0 0 12px;font-weight:950;letter-spacing:-.5px}h2,h3{margin-top:0}p{color:var(--muted);line-height:1.45}
label{font-weight:800;font-size:14px;display:block;margin:0 0 6px}
input,select{width:100%;padding:14px;border-radius:16px;border:1px solid rgba(0,0,0,.10);margin-bottom:14px;font-size:16px;background:#f0f2f6;outline:none}
input:focus,select:focus{border-color:#111;background:white}
button.main,.btnMain{width:100%;display:block;text-align:center;background:#111;color:white;border:0;border-radius:17px;padding:15px 16px;font-weight:950;font-size:16px;cursor:pointer;text-decoration:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}.muted{color:var(--muted);font-size:14px}.msg{margin-top:12px;color:#c62828;font-weight:800;text-align:center;min-height:20px}
.status{display:inline-block;padding:8px 13px;border-radius:999px;font-weight:950;font-size:13px;white-space:nowrap}.odendi{background:#dcfce7;color:#166534}.bekliyor{background:#fef3c7;color:#92400e}.reddedildi,.gecikti{background:#fee2e2;color:#991b1b}
.tableWrap{overflow:auto;border-radius:18px}table{width:100%;border-collapse:collapse;background:white}th,td{padding:13px 14px;border-bottom:1px solid #eee;text-align:left;font-size:14px;vertical-align:middle}th{background:#f8f8f8;font-weight:950}
.small{background:#111;color:white;border:0;border-radius:12px;padding:9px 11px;font-weight:900;cursor:pointer;margin:2px}.green{background:#15803d}.red{background:#b91c1c}.gray{background:#4b5563}
.tutarInput{width:105px!important;padding:8px!important;border-radius:10px!important;margin:0!important}.ibanBox{display:flex;align-items:center;gap:10px}
.iban{flex:1;background:#f5f5f7;border-radius:18px;padding:15px;font-size:15px;letter-spacing:.35px;font-weight:950;word-break:break-word}.copyBtn{width:50px;height:50px;border:0;border-radius:17px;background:#111;color:white;font-size:21px;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.12)}
.copyMsg{margin-top:8px;font-weight:800;color:#166534;min-height:20px}.historyItem{background:white;border-radius:22px;padding:18px;box-shadow:var(--soft);display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:12px}
.historyLeft{display:flex;flex-direction:column;gap:6px}.historyTitle{font-weight:950;font-size:16px}.historyMoney{color:#666;font-weight:800;line-height:1.6}.warningBox{background:#fee2e2;color:#991b1b;border-radius:20px;padding:15px;font-weight:950;margin-top:14px}
.fazla,.tamam{display:inline-block;margin-top:6px;color:#166534;background:#dcfce7;padding:6px 10px;border-radius:999px;font-weight:950}
.borc{display:inline-block;margin-top:6px;color:#991b1b;background:#fee2e2;padding:6px 10px;border-radius:999px;font-weight:950}
.hide{display:none!important}@media(max-width:720px){.wrap{padding:0 10px}.card{padding:18px;border-radius:22px}h1{font-size:27px}th,td{font-size:13px;padding:10px}.historyItem{align-items:flex-start;flex-direction:column}.ibanBox{align-items:stretch}.copyBtn{height:auto;min-width:50px}}
</style></head>
<body>
<div id="adminLogin" class="centerWrap">
  <div class="card loginCard"><div class="logo">☕</div><h1 style="text-align:center">Ödeme Admin</h1><p style="text-align:center">Çay ocağı ödeme takibi</p><label>Admin Kullanıcı</label><input id="adminUser" placeholder="admin"><label>Şifre</label><input id="adminPass" type="password"><button class="main" onclick="adminLogin()">Giriş Yap</button><div id="loginMsg" class="msg"></div></div>
</div>
<div id="adminPanel" class="hide">
  <div class="topbar"><button onclick="adminLogout()">Çıkış</button><a href="index.html">Personel Giriş</a></div>
  <div class="wrap">
    <div class="card">
      <h1>Admin Ödeme Takibi</h1><p>Ödeme dönemi ayın 15'inden sonraki ayın 14'üne kadardır. Yeni dönem her ayın 15'inde başlar.</p>
      <div class="grid">
        <div><label>Dönem Seç</label><input id="adminAy" type="month" onchange="adminListele()"><p class="muted" id="donemLabelAdmin"></p></div>
        <div><label>Filtre</label><select id="adminFiltre" onchange="adminListele()"><option value="hepsi">Hepsi</option><option value="odendi">Ödendi</option><option value="odeme_bekliyor">Ödeme Bekliyor</option><option value="reddedildi">Reddedildi</option></select></div>
        <div><label>Bu Dönem Toplanacak Tutar</label><input id="aylikTutarInput" type="number" min="0" placeholder="Örn: 600"></div>
      </div>
      <button class="main" onclick="aylikTutarKaydet()">Bu Dönem Tutarını Kaydet</button>
    </div>
    <div class="card"><h3>Özet</h3><div id="adminOzet" class="grid"></div></div>
    <div class="card"><h3>Personel Listesi</h3><div class="tableWrap"><table><thead><tr><th>Personel</th><th>Telefon</th><th>Dönem</th><th>Ödenen Tutar</th><th>Durum</th><th>İşlem</th></tr></thead><tbody id="adminTable"></tbody></table></div></div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain:"berber-randevu-14f7f.firebaseapp.com",
  projectId:"berber-randevu-14f7f"
};

const app=initializeApp(firebaseConfig); const db=getFirestore(app);

const ODEME_COLLECTION="cay_odemeler";
const AYAR_COLLECTION="cay_ayarlar";
const PERSONEL_COLLECTION="personeller";
const VARSAYILAN_AIDAT=300;

function temizTelefon(tel){
  tel=String(tel||"").replace(/\D/g,"");
  if(tel.startsWith("90")) tel="0"+tel.slice(2);
  if(tel && !tel.startsWith("0")) tel="0"+tel;
  return tel.slice(0,11);
}
function aylarTR(){return ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];}
function ayAdi(key){const m=Number(String(key||"").split("-")[1]);return aylarTR()[m-1]||key;}
function addMonthsKey(key,delta){const [y,m]=String(key).split("-").map(Number);const d=new Date(y,m-1+delta,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function donemKey(date=new Date()){
  const y=date.getFullYear(), m=date.getMonth()+1;
  if(date.getDate()>=15) return y+"-"+String(m).padStart(2,"0");
  const d=new Date(y,m-2,1);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}
function donemLabel(key){const next=addMonthsKey(key,1);return `15 ${ayAdi(key)} - 14 ${ayAdi(next)}`;}
function donemGectiMi(key){return String(key)<donemKey(new Date());}
function durumText(durum,key){
  if(durum==="odendi") return "Ödendi";
  if(durum==="reddedildi") return "Reddedildi";
  if(donemGectiMi(key)) return "ÖDEME GEÇTİ - Dönem: "+ayAdi(key);
  return "Ödeme Bekliyor";
}
function durumClass(durum,key){
  if(durum==="odendi") return "odendi";
  if(durum==="reddedildi") return "reddedildi";
  if(donemGectiMi(key)) return "gecikti";
  return "bekliyor";
}
function odemeDocId(key,tel){return key+"_"+temizTelefon(tel);}
async function donemTutariGetir(db,key,fallback=VARSAYILAN_AIDAT){
  try{
    const snap=await getDoc(doc(db,AYAR_COLLECTION,key));
    if(snap.exists()){
      const t=Number(snap.data().aylikTutar||0);
      if(t>0) return t;
    }
  }catch(e){console.warn(e);}
  return fallback;
}
function borcFazlaHtml(donemTutar, odenenTutar){
  const fark = Number(odenenTutar || 0) - Number(donemTutar || 0);
  if(fark > 0) return `<span class="fazla">Fazla Ödeme: ${fark} TL</span>`;
  if(fark < 0) return `<span class="borc">Güncel Borç: ${Math.abs(fark)} TL</span>`;
  return `<span class="tamam">Borç Yok</span>`;
}

const ADMIN_USER="admin"; const ADMIN_PASS="123456";
let aktifDonemTutari=VARSAYILAN_AIDAT;

function getAd(p){return p.isim||p.adSoyad||p.ad||p.name||p.fullName||"İsimsiz Personel";}
function getTelefonFromDoc(id,p){return temizTelefon(p.telefon||p.phone||p.tel||p.gsm||id||"");}
function getAktif(p){if(p.aktif===false) return false;if(p.active===false) return false;if(p.durum==="pasif") return false;return true;}

window.adminLogin=function(){
  const u=document.getElementById("adminUser").value.trim(), p=document.getElementById("adminPass").value.trim();
  if(u===ADMIN_USER && p===ADMIN_PASS){localStorage.setItem("cay_admin_login","true");adminAc();}
  else document.getElementById("loginMsg").textContent="Admin bilgileri hatalı";
};
window.adminLogout=function(){localStorage.removeItem("cay_admin_login");location.reload();};
function adminAc(){document.getElementById("adminLogin").classList.add("hide");document.getElementById("adminPanel").classList.remove("hide");document.getElementById("adminAy").value=donemKey();adminListele();}

window.aylikTutarKaydet=async function(){
  const key=document.getElementById("adminAy").value||donemKey();
  const tutar=Number(document.getElementById("aylikTutarInput").value||0);
  if(!tutar||tutar<=0) return alert("Geçerli bir tutar gir.");
  await setDoc(doc(db,AYAR_COLLECTION,key),{aylikTutar:tutar,donem:key,donemEtiketi:donemLabel(key),updatedAt:serverTimestamp()},{merge:true});
  alert("Dönem tutarı kaydedildi.");
  adminListele();
};

window.adminListele=async function(){
  const key=document.getElementById("adminAy").value||donemKey();
  const filtre=document.getElementById("adminFiltre").value;
  document.getElementById("donemLabelAdmin").textContent="Dönem: "+donemLabel(key);

  aktifDonemTutari=await donemTutariGetir(db,key,VARSAYILAN_AIDAT);
  document.getElementById("aylikTutarInput").value=aktifDonemTutari;

  const personelSnap=await getDocs(collection(db,PERSONEL_COLLECTION));
  const odemeSnap=await getDocs(query(collection(db,ODEME_COLLECTION),where("ay","==",key)));

  const odemeler={};
  odemeSnap.forEach(d=>{const o={id:d.id,...d.data()}; if(o.telefon) odemeler[temizTelefon(o.telefon)]=o; if(o.personelId) odemeler[temizTelefon(o.personelId)]=o;});

  let personeller=[];
  personelSnap.forEach(pdoc=>{const p={id:pdoc.id,...pdoc.data()}; if(getAktif(p)) personeller.push(p);});
  personeller.sort((a,b)=>getAd(a).localeCompare(getAd(b),"tr",{sensitivity:"base"}));

  let rows="", say={odendi:0,odeme_bekliyor:0,reddedildi:0}, toplamOnayliTutar=0;
  const beklenenToplam=personeller.length*aktifDonemTutari;

  personeller.forEach(personel=>{
    const tel=getTelefonFromDoc(personel.id,personel);
    const ad=getAd(personel);
    const odeme=odemeler[tel];
    const durum=odeme ? (odeme.durum||"odeme_bekliyor") : "odeme_bekliyor";
    const tutar=Number(odeme?.tutar||aktifDonemTutari||VARSAYILAN_AIDAT);

    say[durum]=(say[durum]||0)+1;
    if(durum==="odendi") toplamOnayliTutar+=Number(tutar||0);
    if(filtre!=="hepsi" && filtre!==durum) return;

    const inputId="tutar_"+tel;
    const safeAd=String(ad).replaceAll("'","\\'");

    rows+=`
      <tr>
        <td>${ad}</td>
        <td>${tel}</td>
        <td>${donemLabel(key)}</td>
        <td><input id="${inputId}" class="tutarInput" type="number" min="0" value="${tutar}" placeholder="${aktifDonemTutari}"> TL</td>
        <td><span class="status ${durumClass(durum,key)}">${durumText(durum,key)}</span></td>
        <td>
          <button class="small green" onclick="durumDegistir('${tel}','${safeAd}','odendi','${inputId}')">Ödendi</button>
          <button class="small gray" onclick="durumDegistir('${tel}','${safeAd}','odeme_bekliyor','${inputId}')">Bekliyor</button>
          <button class="small red" onclick="reddet('${tel}','${safeAd}','${inputId}')">Reddet</button>
        </td>
      </tr>`;
  });

  document.getElementById("adminTable").innerHTML=rows||`<tr><td colspan="6">Kayıt yok.</td></tr>`;
  document.getElementById("adminOzet").innerHTML=`
    <div class="card"><h3>Bu Dönem Aidatı</h3><h1>${aktifDonemTutari} TL</h1></div>
    <div class="card"><h3>Ödendi</h3><h1>${say.odendi}</h1></div>
    <div class="card"><h3>Ödeme Bekliyor</h3><h1>${say.odeme_bekliyor}</h1></div>
    <div class="card"><h3>Reddedildi</h3><h1>${say.reddedildi}</h1></div>
    <div class="card"><h3>Beklenen Toplam</h3><h1>${beklenenToplam} TL</h1></div>
    <div class="card"><h3>Onaylanan Toplam</h3><h1>${toplamOnayliTutar} TL</h1></div>`;
};

window.durumDegistir=async function(telefon,adSoyad,yeniDurum,inputId){
  const key=document.getElementById("adminAy").value||donemKey();
  const tel=temizTelefon(telefon);
  let girilenTutar=Number(document.getElementById(inputId)?.value||0);
  if(!girilenTutar||girilenTutar<=0) girilenTutar=aktifDonemTutari||VARSAYILAN_AIDAT;

  const ref=doc(db,ODEME_COLLECTION,odemeDocId(key,tel));
  await setDoc(ref,{
    personelId:tel, telefon:tel, adSoyad, ay:key, donemEtiketi:donemLabel(key),
    tutar:girilenTutar, durum:yeniDurum, adminNot:"", updatedAt:serverTimestamp()
  },{merge:true});
  adminListele();
};

window.reddet=async function(telefon,adSoyad,inputId){
  const sebep=prompt("Reddetme sebebi:","Ödeme görünmedi");
  const key=document.getElementById("adminAy").value||donemKey();
  const tel=temizTelefon(telefon);
  let girilenTutar=Number(document.getElementById(inputId)?.value||0);
  if(!girilenTutar||girilenTutar<=0) girilenTutar=aktifDonemTutari||VARSAYILAN_AIDAT;

  const ref=doc(db,ODEME_COLLECTION,odemeDocId(key,tel));
  await setDoc(ref,{
    personelId:tel, telefon:tel, adSoyad, ay:key, donemEtiketi:donemLabel(key),
    tutar:girilenTutar, durum:"reddedildi", adminNot:sebep||"Reddedildi", updatedAt:serverTimestamp()
  },{merge:true});
  adminListele();
};

if(localStorage.getItem("cay_admin_login")==="true") adminAc();
</script>
</body></html>
