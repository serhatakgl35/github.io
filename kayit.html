<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İlk Kayıt Ol</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;
background:
  radial-gradient(circle at 20% 10%, rgba(255,255,255,.95), transparent 32%),
  radial-gradient(circle at 80% 0%, rgba(225,229,238,.9), transparent 35%),
  #f5f5f7;
color:#111;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:18px;
}

.card{
width:100%;
max-width:430px;
background:rgba(255,255,255,.84);
padding:32px;
border-radius:34px;
box-shadow:0 28px 80px rgba(0,0,0,.13);
text-align:center;
border:1px solid rgba(255,255,255,.75);
backdrop-filter:blur(22px);
-webkit-backdrop-filter:blur(22px);
}

.logo{
width:66px;
height:66px;
border-radius:20px;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
margin:0 auto 18px;
box-shadow:0 14px 34px rgba(0,0,0,.18);
}

h1{
margin:10px 0 8px;
font-size:30px;
font-weight:950;
letter-spacing:-.8px;
}

p{
color:#666;
margin:0 0 24px;
font-size:16px;
line-height:1.45;
}

label{
display:block;
text-align:left;
font-weight:900;
margin:14px 0 7px;
font-size:15px;
}

input{
width:100%;
padding:16px 18px;
border-radius:18px;
border:1px solid rgba(0,0,0,.12);
background:#eef1f6;
font-size:16px;
outline:none;
transition:.2s ease;
}

input:focus{
background:white;
border-color:rgba(0,0,0,.28);
box-shadow:0 0 0 5px rgba(17,17,17,.06);
}

button,.link-btn{
width:100%;
margin-top:18px;
padding:16px;
border:none;
border-radius:20px;
background:#111;
color:white;
font-weight:950;
font-size:17px;
cursor:pointer;
text-decoration:none;
display:block;
font-family:inherit;
box-shadow:0 16px 34px rgba(0,0,0,.17);
transition:.2s ease;
}

button:hover,.link-btn:hover{transform:translateY(-1px)}
button:active,.link-btn:active{transform:scale(.99)}

button:disabled{
opacity:.65;
cursor:not-allowed;
transform:none;
}

.alt{margin-top:16px}

.alt .link-btn{
margin-top:0;
background:white;
color:#111;
border:1px solid rgba(0,0,0,.12);
box-shadow:none;
}

.note{
margin-top:14px;
font-size:13px;
color:#666;
line-height:1.45;
}

@media(max-width:520px){
body{
padding:14px;
align-items:flex-start;
padding-top:24px;
}

.card{
padding:26px 22px;
border-radius:30px;
box-shadow:0 18px 45px rgba(0,0,0,.10);
backdrop-filter:none;
-webkit-backdrop-filter:none;
}

h1{font-size:27px}

input{
font-size:16px;
padding:15px 16px;
}

button,.link-btn{
padding:15px;
}
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">✂️</div>

  <h1>İlk Kayıt Ol</h1>
  <p>Randevu sistemini kullanmak için hesabını oluştur</p>

  <label>Ad</label>
  <input type="text" id="ad" placeholder="Ad" autocomplete="given-name" oninput="adDuzenle(this)">

  <label>Soyad</label>
  <input type="text" id="soyad" placeholder="SOYAD" autocomplete="family-name" oninput="soyadDuzenle(this)">

  <label>Telefon Numarası</label>
  <input type="tel" id="tel" placeholder="05XXXXXXXXX" oninput="telDuzenle(this)" inputmode="tel" autocomplete="tel">

  <label>Şifre Belirle</label>
  <input type="password" id="sifre" placeholder="En az 4 karakter" autocomplete="new-password">

  <button id="kayitBtn" onclick="kayitOl()">Kayıt Ol</button>

  <div class="alt">
    <a class="link-btn" href="index.html">Giriş Sayfasına Dön</a>
  </div>

  <div class="note">
    Telefon numaranız yazmaya başlayınca sistem otomatik olarak başına 0 ekler.
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain:"berber-randevu-14f7f.firebaseapp.com",
  projectId:"berber-randevu-14f7f",
  storageBucket:"berber-randevu-14f7f.firebasestorage.app",
  messagingSenderId:"280530860977",
  appId:"1:280530860977:web:52c0df04c228896f211b90"
};

const MUSTERILER_KOLEKSIYON = "personeller";

let firebaseHazir = null;

async function firebaseYukle(){
  if(firebaseHazir) return firebaseHazir;

  firebaseHazir = Promise.all([
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
  ]).then(([appMod, fsMod]) => {
    const app = appMod.initializeApp(firebaseConfig);
    const db = fsMod.getFirestore(app);

    return {
      db,
      doc: fsMod.doc,
      getDoc: fsMod.getDoc,
      setDoc: fsMod.setDoc
    };
  });

  return firebaseHazir;
}

function trBuyukHarf(metin){
  return String(metin || "")
    .replace(/i/g,"İ")
    .replace(/ı/g,"I")
    .replace(/ğ/g,"Ğ")
    .replace(/ü/g,"Ü")
    .replace(/ş/g,"Ş")
    .replace(/ö/g,"Ö")
    .replace(/ç/g,"Ç")
    .toUpperCase();
}

function adBasHarfBuyut(metin){
  return String(metin || "")
    .toLocaleLowerCase("tr-TR")
    .replace(/(^|\s|-)([a-zçğıöşü])/g, function(tam, bosluk, harf){
      return bosluk + harf.toLocaleUpperCase("tr-TR");
    });
}

window.adDuzenle = function(input){
  const pos = input.selectionStart;
  input.value = adBasHarfBuyut(input.value.replace(/[^a-zA-ZçÇğĞıİöÖşŞüÜ\s-]/g,""));
  try{ input.setSelectionRange(pos,pos); }catch(e){}
}

window.soyadDuzenle = function(input){
  const pos = input.selectionStart;
  input.value = trBuyukHarf(input.value.replace(/[^a-zA-ZçÇğĞıİöÖşŞüÜ\s-]/g,""));
  try{ input.setSelectionRange(pos,pos); }catch(e){}
}

window.telDuzenle = function(input){
  let v = input.value.replace(/\D/g,"");

  if(!v){
    input.value = "";
    return;
  }

  if(v.startsWith("90")) v = v.slice(2);
  if(!v.startsWith("0")) v = "0" + v;

  input.value = v.slice(0,11);
}

async function telegramBildirimGonder(mesaj){

  const BOT_TOKEN = "8635739693:AAFYGCIgGW7WTwvMIhh5Yvy_wXttPR2kC28";
  const CHAT_ID = "-1003670319520";

  const url =
    `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

  try{
    await fetch(url,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        chat_id: CHAT_ID,
        text: mesaj
      })
    });
  }catch(e){
    console.error("Telegram gönderim hatası:", e);
  }
}

window.kayitOl = async function(){

  const btn = document.getElementById("kayitBtn");

  const ad = adBasHarfBuyut(document.getElementById("ad").value.trim());
  const soyad = trBuyukHarf(document.getElementById("soyad").value.trim());
  const isim = (ad + " " + soyad).trim();
  const tel = document.getElementById("tel").value.trim();
  const sifre = document.getElementById("sifre").value.trim();

  if(!ad){
    alert("Lütfen ad gir.");
    return;
  }

  if(!soyad){
    alert("Lütfen soyad gir.");
    return;
  }

  if(!tel || tel.length !== 11){
    alert("Telefon numarasını 05391234567 şeklinde gir.");
    return;
  }

  if(!sifre || sifre.length < 4){
    alert("Şifre en az 4 karakter olmalı.");
    return;
  }

  try{

    btn.disabled = true;
    btn.textContent = "Kaydediliyor...";

    const { db, doc, getDoc, setDoc } = await firebaseYukle();

    const ref = doc(db, MUSTERILER_KOLEKSIYON, tel);
    const snap = await getDoc(ref);

    if(snap.exists()){

      const eski = snap.data() || {};
      const zatenUye = eski.uyeMi === true || !!eski.sifre;

      if(zatenUye){
        alert("Bu telefon numarası zaten kayıtlı. Giriş yapabilirsin.");
        location.href = "index.html";
        return;
      }

      await setDoc(ref,{
        ad: ad,
        soyad: soyad,
        isim: isim,
        adSoyad: isim,
        name: isim,
        fullName: isim,
        telefon: tel,
        sifre: sifre,
        uyeMi: true,
        aktif: false,
        active: false,
        durum: "beklemede",
        updatedAt: new Date().toISOString()
      }, { merge:true });

      await telegramBildirimGonder(
`🆕 YENİ PERSONEL KAYDI

👤 ${isim}
📞 ${tel}

⏳ Durum: Onay Bekliyor`
      );

      localStorage.removeItem("musteriGiris");
      localStorage.removeItem("musteriAd");
      localStorage.removeItem("musteriTelefon");

      alert("Kayıt alındı. Hesabınız admin onayı bekliyor.");
      location.href = "index.html";
      return;
    }

    await setDoc(ref,{
      ad: ad,
      soyad: soyad,
      isim: isim,
      adSoyad: isim,
      name: isim,
      fullName: isim,
      telefon: tel,
      sifre: sifre,
      uyeMi: true,
      aktif: false,
      active: false,
      durum: "beklemede",
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    });

    await telegramBildirimGonder(
`🆕 YENİ PERSONEL KAYDI

👤 ${isim}
📞 ${tel}

⏳ Durum: Onay Bekliyor`
    );

    localStorage.removeItem("musteriGiris");
    localStorage.removeItem("musteriAd");
    localStorage.removeItem("musteriTelefon");

    alert("Kayıt alındı. Hesabınız admin onayı bekliyor.");
    location.href = "index.html";

  }catch(e){

    console.error(e);

    alert("Kayıt yapılamadı: " + e.message);

    btn.disabled = false;
    btn.textContent = "Kayıt Ol";
  }
}
</script>

</body>
</html>
