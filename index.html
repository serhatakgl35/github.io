<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Müşteri Giriş</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;
background:#f5f5f7;
color:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:100%;
max-width:400px;
background:white;
padding:28px;
border-radius:28px;
box-shadow:0 20px 50px rgba(0,0,0,.12);
text-align:center;
}

.logo{
width:60px;
height:60px;
border-radius:16px;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
margin:0 auto 14px;
}

h1{
margin:10px 0 6px;
font-size:26px;
font-weight:900;
}

p{
color:#666;
margin-bottom:20px;
}

label{
display:block;
text-align:left;
font-weight:700;
margin:12px 0 6px;
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
background:#eef1f6;
font-size:14px;
}

button{
width:100%;
margin-top:18px;
padding:14px;
border:none;
border-radius:16px;
background:#111;
color:white;
font-weight:900;
font-size:16px;
cursor:pointer;
}

.alt{
margin-top:16px;
}

.alt button{
background:white;
color:#111;
border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">✂️</div>

  <h1>Müşteri Giriş</h1>
  <p>Randevularını görüntülemek için giriş yap</p>

  <label>Telefon Numarası</label>
  <input type="tel" id="tel" placeholder="05XXXXXXXXX">

  <label>Şifre</label>
  <input type="password" id="sifre" placeholder="Şifreniz">

  <button onclick="giris()">Giriş Yap</button>

  <div class="alt">
    <button onclick="location.href='kayit.html'">
      İlk Kayıt Ol
    </button>
  </div>

</div>

<script>
function giris(){
  const tel = document.getElementById("tel").value;
  const sifre = document.getElementById("sifre").value;

  if(!tel || !sifre){
    alert("Lütfen bilgileri gir");
    return;
  }

  // burayı kendi sisteme bağlayacaksın
  // şimdilik direkt yönlendirme
  location.href = "randevu.html";
}
</script>

</body>
</html>
