<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Müşteri Giriş</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;
background:
  radial-gradient(circle at 20% 10%, rgba(255,255,255,.95), transparent 32%),
  radial-gradient(circle at 80% 0%, rgba(225,229,238,.9), transparent 35%),
  #f5f5f7;
color:#111;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:18px;
}

.card{
width:100%;
max-width:430px;
background:rgba(255,255,255,.84);
padding:32px;
border-radius:34px;
box-shadow:0 28px 80px rgba(0,0,0,.13);
text-align:center;
border:1px solid rgba(255,255,255,.75);
backdrop-filter:blur(22px);
-webkit-backdrop-filter:blur(22px);
}

.logo{
width:66px;
height:66px;
border-radius:20px;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
margin:0 auto 18px;
box-shadow:0 14px 34px rgba(0,0,0,.18);
}

h1{
margin:10px 0 8px;
font-size:30px;
font-weight:950;
letter-spacing:-.8px;
}

p{
color:#666;
margin:0 0 24px;
font-size:16px;
line-height:1.45;
}

label{
display:block;
text-align:left;
font-weight:900;
margin:14px 0 7px;
font-size:15px;
}

input{
width:100%;
padding:16px 18px;
border-radius:18px;
border:1px solid rgba(0,0,0,.12);
background:#eef1f6;
font-size:16px;
outline:none;
transition:.2s ease;
}

input:focus{
background:white;
border-color:rgba(0,0,0,.28);
box-shadow:0 0 0 5px rgba(17,17,17,.06);
}

button,.link-btn{
width:100%;
margin-top:18px;
padding:16px;
border:none;
border-radius:20px;
background:#111;
color:white;
font-weight:950;
font-size:17px;
cursor:pointer;
text-decoration:none;
display:block;
font-family:inherit;
box-shadow:0 16px 34px rgba(0,0,0,.17);
transition:.2s ease;
}

button:hover,.link-btn:hover{
transform:translateY(-1px);
}

button:active,.link-btn:active{
transform:scale(.99);
}

.alt{
margin-top:16px;
display:grid;
gap:12px;
}

.alt button,
.alt .link-btn{
margin-top:0;
background:white;
color:#111;
border:1px solid rgba(0,0,0,.12);
box-shadow:none;
}

.stat-btn{
background:#f5f5f7!important;
}

@media(max-width:520px){
.card{
padding:26px 22px;
border-radius:30px;
}
h1{font-size:27px}
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">✂️</div>

  <h1>Müşteri Giriş</h1>
  <p>Randevularını görüntülemek için giriş yap</p>

  <label>Telefon Numarası</label>
  <input type="tel" id="tel" placeholder="5XXXXXXXXX" oninput="telDuzenle(this)" inputmode="tel" autocomplete="tel">

  <label>Şifre</label>
  <input type="password" id="sifre" placeholder="Şifreniz">

  <button onclick="giris()">Giriş Yap</button>

  <div class="alt">
    <button onclick="location.href='kayit.html'">
      İlk Kayıt Ol
    </button>

    <a class="link-btn stat-btn" href="https://www.kantin10.com.tr/istatistik.html">
      İstatistik
    </a>
  </div>

</div>

<script>
function telDuzenle(input){
  let v = input.value.replace(/\D/g,"");

  if(!v){
    input.value = "";
    return;
  }

  if(v.startsWith("90")) v = v.slice(2);
  if(!v.startsWith("0")) v = "0" + v;

  input.value = v.slice(0,11);
}

function giris(){
  const tel = document.getElementById("tel").value.trim();
  const sifre = document.getElementById("sifre").value.trim();

  if(!tel || !sifre){
    alert("Lütfen bilgileri gir");
    return;
  }

  localStorage.setItem("musteriGiris", "true");
  localStorage.setItem("musteriTelefon", tel);

  location.href = "randevu.html";
}
</script>

</body>
</html>
