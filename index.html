<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;
background:
radial-gradient(circle at 20% 10%, rgba(255,255,255,.95), transparent 32%),
radial-gradient(circle at 80% 0%, rgba(225,229,238,.9), transparent 35%),
#f5f5f7;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.85);
padding:30px;
border-radius:30px;
box-shadow:0 25px 70px rgba(0,0,0,.12);
backdrop-filter:blur(20px);
}

.logo{
width:60px;height:60px;
border-radius:18px;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
font-size:26px;
font-weight:900;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:20px;
}

label{
font-weight:700;
font-size:14px;
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:14px;
border-radius:15px;
border:1px solid #ddd;
margin-bottom:14px;
font-size:16px;
background:#f0f2f6;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:#111;
color:white;
font-weight:900;
font-size:16px;
cursor:pointer;
}

.alt{
margin-top:16px;
display:grid;
gap:12px;
}

.alt button{
background:white;
color:#111;
border:1px solid rgba(0,0,0,.12);
}

.msg{
margin-top:10px;
color:#c62828;
font-weight:700;
text-align:center;
min-height:20px;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">✂️</div>

<h1>Giriş Yap</h1>
<p>Telefon ve şifre ile giriş yap</p>

<label>Telefon</label>
<input type="tel" id="tel" placeholder="5XXXXXXXXX">

<label>Şifre</label>
<input type="password" id="sifre">

<button id="btn">Giriş Yap</button>

<div class="alt">
  <button onclick="location.href='kayit.html'">Kayıt Ol</button>
  <button onclick="location.href='istatistik.html'">İstatistik</button>
</div>

<div id="msg" class="msg"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
authDomain:"berber-randevu-14f7f.firebaseapp.com",
projectId:"berber-randevu-14f7f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const telInput = document.getElementById("tel");
const sifreInput = document.getElementById("sifre");
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");

/* ===== TELEFON ULTRA FORMAT ===== */
function formatTel(v){
  v = v.replace(/\D/g,"");
  if(!v) return "";
  if(v.startsWith("90")) v = v.slice(2);
  if(!v.startsWith("0")) v = "0" + v;
  return v.slice(0,11);
}

telInput.addEventListener("input",(e)=>{
  const eski = e.target.value;
  const pos = e.target.selectionStart;

  const yeni = formatTel(eski);
  if(eski === yeni) return;

  e.target.value = yeni;

  let yeniPos = pos;
  if(yeni.length > eski.length) yeniPos++;

  requestAnimationFrame(()=>{
    e.target.setSelectionRange(yeniPos,yeniPos);
  });
});

telInput.addEventListener("paste",(e)=>{
  e.preventDefault();
  const data = (e.clipboardData || window.clipboardData).getData("text");
  const temiz = formatTel(data);
  telInput.value = temiz;

  requestAnimationFrame(()=>{
    telInput.setSelectionRange(temiz.length, temiz.length);
  });
});

/* ===== GİRİŞ ===== */
btn.onclick = async ()=>{
  const tel = telInput.value.trim();
  const sifre = sifreInput.value.trim();

  msg.textContent="";

  if(!tel || tel.length !== 11){
    msg.textContent="Telefon hatalı";
    return;
  }

  if(!sifre){
    msg.textContent="Şifre gir";
    return;
  }

  btn.disabled=true;
  btn.textContent="Kontrol...";

  try{
    const ref = doc(db,"personeller",tel);
    const snap = await getDoc(ref);

    if(!snap.exists()){
      msg.textContent="Kayıt yok";
      return;
    }

    const data = snap.data();

    if(String(data.sifre) !== String(sifre)){
      msg.textContent="Şifre yanlış";
      return;
    }

    localStorage.setItem("musteriGiris","true");
    localStorage.setItem("musteriTelefon",tel);
    localStorage.setItem("musteriAd",data.isim || "");

    location.href="randevu.html";

  }catch(e){
    msg.textContent="Hata oluştu";
    console.error(e);
  }
  finally{
    btn.disabled=false;
    btn.textContent="Giriş Yap";
  }
}
</script>

</body>
</html>
