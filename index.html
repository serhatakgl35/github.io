<input
  type="tel"
  id="tel"
  placeholder="5XXXXXXXXX"
  inputmode="tel"
  autocomplete="tel"
>

<script>
const telInput = document.getElementById("tel");

function telefonFormatla(deger){
  let v = String(deger || "").replace(/\D/g, "");

  // Boşsa boş bırak: başta 0 görünmez
  if(!v) return "";

  // +90 / 90 ile gelirse temizle
  if(v.startsWith("90")) v = v.slice(2);

  // 0 ile başlamıyorsa otomatik 0 ekle
  if(!v.startsWith("0")) v = "0" + v;

  // Türkiye GSM için 11 hane
  return v.slice(0, 11);
}

telInput.addEventListener("input", function(e){
  const input = e.target;
  const eskiDeger = input.value;
  const eskiCursor = input.selectionStart;

  const yeniDeger = telefonFormatla(eskiDeger);

  // Eğer değer değişmediyse cursor'a dokunma
  if(eskiDeger === yeniDeger) return;

  input.value = yeniDeger;

  // Cursor zıplamasını azalt
  let yeniCursor = eskiCursor;

  // Başına 0 eklendiyse cursor'u 1 ileri al
  if(yeniDeger.length > eskiDeger.length){
    yeniCursor = eskiCursor + 1;
  }

  // Silme sırasında cursor sona fırlamasın
  yeniCursor = Math.min(yeniCursor, yeniDeger.length);

  requestAnimationFrame(()=>{
    input.setSelectionRange(yeniCursor, yeniCursor);
  });
});

telInput.addEventListener("paste", function(e){
  e.preventDefault();

  const yapisan = (e.clipboardData || window.clipboardData).getData("text");
  const temiz = telefonFormatla(yapisan);

  telInput.value = temiz;

  requestAnimationFrame(()=>{
    telInput.setSelectionRange(temiz.length, temiz.length);
  });
});
</script>
