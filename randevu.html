<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Randevu Al</title>

<style>
*{box-sizing:border-box}

:root{
  --bg:#f5f5f7;
  --text:#111;
  --muted:#6b7280;
  --card:rgba(255,255,255,.82);
  --line:rgba(0,0,0,.10);
  --shadow:0 24px 70px rgba(0,0,0,.10);
}

html{
  width:100%;
  overflow-x:hidden;
  -webkit-text-size-adjust:100%;
  scroll-behavior:smooth;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 18% 12%, rgba(255,255,255,.95), transparent 30%),
    radial-gradient(circle at 80% 0%, rgba(225,229,238,.95), transparent 34%),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
  overflow-x:hidden;
}

.bg-orb{
  position:fixed;
  width:360px;
  height:360px;
  border-radius:50%;
  filter:blur(70px);
  opacity:.28;
  z-index:-1;
  animation:float 9s ease-in-out infinite;
}
.bg-orb.one{background:#dbeafe;top:8%;left:8%}
.bg-orb.two{background:#f3e8ff;right:10%;bottom:10%;animation-delay:1.5s}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-24px)}
}

@keyframes rise{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}

.wrap{
  width:100%;
  max-width:1120px;
  margin:0 auto;
  padding:24px 16px 48px;
}

.topbar{
  position:sticky;
  top:14px;
  z-index:50;
  max-width:1120px;
  margin:0 auto 20px;
  background:rgba(17,17,17,.92);
  color:#fff;
  border:1px solid rgba(255,255,255,.12);
  border-radius:26px;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  box-shadow:0 18px 45px rgba(0,0,0,.18);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:950;
  letter-spacing:-.3px;
}

.logo{
  width:38px;
  height:38px;
  border-radius:14px;
  background:#fff;
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);
}

.nav-actions{
  display:flex;
  gap:8px;
  align-items:center;
}

.nav-btn{
  border:none;
  background:#fff;
  color:#111;
  padding:10px 14px;
  border-radius:999px;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
  font-size:14px;
}

.hero,
.panel{
  background:var(--card);
  border:1px solid rgba(255,255,255,.76);
  border-radius:32px;
  padding:28px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  animation:rise .45s ease both;
}

.hero{
  margin-bottom:18px;
}

.hero h1{
  margin:0;
  font-size:34px;
  letter-spacing:-1px;
  line-height:1.1;
}

.hero p{
  color:var(--muted);
  font-size:17px;
  margin:10px 0 0;
  line-height:1.5;
}

.panel{
  width:100%;
  max-width:1120px;
  margin:0 auto;
}

.panel-title{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  margin-bottom:18px;
}

.panel-title h2{
  margin:0;
  font-size:28px;
  letter-spacing:-.7px;
}

.panel-title p{
  margin:6px 0 0;
  color:var(--muted);
  line-height:1.4;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:7px;
}

label{
  font-size:14px;
  font-weight:900;
  color:#111;
}

input,select{
  width:100%;
  border:1px solid rgba(0,0,0,.12);
  background:rgba(238,242,248,.9);
  color:#111;
  padding:15px 16px;
  border-radius:18px;
  outline:none;
  font-size:16px;
  font-family:inherit;
  transition:.18s ease;
}

select:disabled{
  opacity:1;
  color:#555;
  background:rgba(238,242,248,.9);
}

input:focus,select:focus{
  border-color:rgba(0,0,0,.28);
  box-shadow:0 0 0 5px rgba(17,17,17,.06);
  background:#fff;
}

.btn{
  border:none;
  border-radius:20px;
  background:#111;
  color:#fff;
  padding:16px 18px;
  font-size:17px;
  font-weight:950;
  cursor:pointer;
  font-family:inherit;
  transition:.2s ease;
  box-shadow:0 12px 28px rgba(0,0,0,.16);
}

.btn:hover{transform:translateY(-1px)}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

.btn.light{
  background:#fff;
  color:#111;
  border:1px solid var(--line);
  box-shadow:none;
}

.btn.small{
  padding:11px 14px;
  font-size:14px;
  border-radius:15px;
}

.btn.delete{
  background:#e11d22;
  color:#fff;
}

.info{
  margin-top:14px;
  padding:14px 16px;
  border-radius:18px;
  background:rgba(255,255,255,.72);
  border:1px solid var(--line);
  color:#4b5563;
  line-height:1.45;
}

.success-box{
  display:none;
  margin-top:14px;
  padding:16px;
  border-radius:22px;
  background:rgba(255,255,255,.76);
  border:1px solid var(--line);
}

.success-box h3{
  margin:0 0 8px;
  font-size:18px;
}

.divider{
  height:1px;
  background:var(--line);
  margin:24px 0;
}

.list{
  display:grid;
  gap:14px;
  margin:0;
  padding:0;
  list-style:none;
}

.appt{
  background:#fff;
  border:1px solid rgba(0,0,0,.08);
  border-radius:24px;
  padding:18px;
  box-shadow:0 14px 34px rgba(0,0,0,.08);
  transition:.22s ease;
}

.appt.active{
  border:1px solid rgba(22,163,74,.35);
  box-shadow:
    0 14px 34px rgba(22,163,74,.14),
    0 0 0 1px rgba(22,163,74,.08);
}

.appt.soon{
  border:1px solid rgba(59,130,246,.42);
  box-shadow:
    0 14px 34px rgba(59,130,246,.16),
    0 0 0 1px rgba(59,130,246,.10);
  background:linear-gradient(135deg,#fff,#f8fbff);
}

.appt.cancelled{
  border:1px solid rgba(225,29,72,.35);
  box-shadow:
    0 14px 34px rgba(225,29,72,.12),
    0 0 0 1px rgba(225,29,72,.08);
  background:linear-gradient(135deg,#fff,#fff7f8);
}

.appt.cancelled .appt-title{
  color:#be123c;
}

.appt.cancelled .badge{
  background:#ffe4e6;
  color:#be123c;
  box-shadow:0 0 12px rgba(225,29,72,.24);
}

.cancel-note{
  margin-top:12px;
  padding:12px 14px;
  border-radius:16px;
  background:#fff1f2;
  color:#9f1239;
  border:1px solid rgba(225,29,72,.18);
  font-weight:850;
  line-height:1.45;
}

.appt-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap:wrap;
}

.appt-title{
  font-size:21px;
  font-weight:950;
  letter-spacing:-.4px;
  margin-bottom:5px;
  color:#16a34a;
}

.appt.soon .appt-title{
  color:#2563eb;
}

.appt-service{
  color:#555;
  font-weight:800;
  margin-bottom:14px;
}

.appt-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.appt-actions .btn{
  width:auto;
  min-width:150px;
  margin:0;
  padding:12px 14px;
  font-size:14px;
  border-radius:15px;
}

.badge{
  display:inline-flex;
  align-items:center;
  border-radius:999px;
  padding:7px 11px;
  font-size:12px;
  font-weight:950;
  background:#dcfce7;
  color:#166534;
  box-shadow:0 0 12px rgba(22,163,74,.35);
}

.appt.soon .badge{
  background:#dbeafe;
  color:#1d4ed8;
  box-shadow:0 0 12px rgba(37,99,235,.35);
}

.empty{
  padding:16px;
  border:1px solid var(--line);
  border-radius:20px;
  color:#6b7280;
  background:rgba(255,255,255,.72);
  font-style:italic;
}

.calendar-controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:12px;
}

.week-label{
  background:rgba(255,255,255,.72);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  text-align:center;
  font-weight:950;
  margin-bottom:14px;
}

.table-wrap{
  transform:scale(.985);
  box-shadow:inset 0 0 0 2px rgba(22,101,52,.18);
}

.dolu{
  background:rgba(254,226,226,.9);
  color:#991b1b;
  font-weight:950;
}

.kapali,
.gecmis{
  background:rgba(229,231,235,.9);
  color:#6b7280;
  font-weight:950;
}

.etiket{
  display:inline-block;
  margin-top:5px;
  padding:3px 7px;
  border-radius:999px;
  font-size:8px;
  font-weight:950;
  background:rgba(255,255,255,.55);
  border:1px solid rgba(0,0,0,.06);
}

@media(max-width:760px){

  .table-wrap{
    overflow:hidden !important;
  }

  table{
    min-width:100% !important;
  }

  th,td{
    padding:10px 2px;
  }

  .saat-col{
    width:60px;
    font-size:11px;
  }

  .gun-adi{
    font-size:10px;
  }

  .gun-tarih{
    font-size:8px;
  }

  .slot{
    font-size:10px;
    min-height:62px;
  }

  .etiket{
    font-size:7px;
    padding:2px 5px;
  }
}
  }
}
